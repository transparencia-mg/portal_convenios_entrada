<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Convênios de Entrada - Governo de Minas Gerais</title>

    <!-- ==================== ESTILOS E BIBLIOTECAS ==================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary-dark: #1a3a5c;
            --primary-darker: #0f2a44;
            --accent-red: #b93c42;
            --background-light: #f5f7fa;
            --success-green: #28a745;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--background-light); 
            padding-bottom: 30px;
        }
        .container-fluid { max-width: 98% !important; margin: 0 auto; padding: 0 20px; }
        
        .filter-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 25px;
        }
        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .form-control, .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
        }
        .btn-primary-custom {
            background: var(--primary-dark);
            border: none;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 8px;
            color: white;
            transition: all 0.2s;
        }
        .btn-primary-custom:hover { background: var(--accent-red); transform: translateY(-1px); }
        
        .metric-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border-left: 4px solid var(--accent-red);
            margin-bottom: 20px;
        }
        .metric-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-dark);
        }
        
        .table-container {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .table {
            margin-bottom: 0;
            font-size: 12px;
        }
        .table thead th {
            background-color: var(--primary-dark);
            color: white;
            font-weight: 600;
            padding: 10px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
        }
        .table thead th:hover { background-color: #2c5a7a; }
        .table thead th i { font-size: 14px; margin-left: 5px; opacity: 0.7; }
        .table tbody td {
            padding: 8px 10px;
            vertical-align: middle;
            border-bottom: 1px solid #edf2f7;
        }
        .table tbody tr:hover { background-color: #f8fafc; }
        
        .badge-status {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-vigente { background: #c6f6d5; color: #22543d; }
        .badge-vencido { background: #fed7d7; color: #9b2c2c; }
        
        .nav-tabs .nav-link {
            font-weight: 600;
            color: var(--primary-dark);
            border: none;
            padding: 10px 20px;
        }
        .nav-tabs .nav-link.active {
            background-color: var(--primary-dark);
            color: white;
            border-radius: 8px;
        }
        
        .pagination-container {
            padding: 12px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        
        .modal-full-custom { max-width: 90%; width: 90%; }
        
        .info-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-dark);
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 12px;
        }
        .info-item {
            background: white;
            padding: 10px 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-red);
        }
        .info-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-dark);
            word-break: break-word;
        }
        .info-value a { color: var(--accent-red); text-decoration: none; }
        .info-value a:hover { text-decoration: underline; }
        
        .btn-export {
            background: transparent;
            border: 1px solid #d6dee6;
            color: #1a3a5c;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .btn-export:hover { background-color: #1a3a5c; color: white; border-color: #1a3a5c; }
        
        .btn-action {
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #1a3a5c;
            background: white;
            color: #1a3a5c;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .btn-action:hover { background-color: #1a3a5c; color: white; }
        
        .column-selector {
            background: white;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .column-selector label {
            font-size: 12px;
            margin-right: 15px;
            cursor: pointer;
        }
        
        .sort-icon { font-size: 12px; margin-left: 4px; }
        
        .table-badge {
            background: #1a3a5c;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .data-atualizacao-box {
            background: transparent;
            padding: 5px 10px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0" style="color: var(--primary-dark);"><i class="material-icons me-2">account_balance</i>Dashboard de Convênios de Entrada</h3>
        <div class="data-atualizacao-box">Data de atualização: <span id="dataAtualizacao"></span></div>
    </div>

    <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#visaoGeral"><i class="material-icons me-1">bar_chart</i> Visão Geral</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#consultaIndividual"><i class="material-icons me-1">search</i> Consulta Individual</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pagamentos"><i class="material-icons me-1">payments</i> Pagamentos</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#downloads"><i class="material-icons me-1">download</i> Downloads</button></li>
    </ul>

    <div class="tab-content">
        <!-- VISÃO GERAL -->
        <div class="tab-pane fade show active" id="visaoGeral">
            <div id="visaoGeralContent"></div>
        </div>

        <!-- CONSULTA INDIVIDUAL -->
        <div class="tab-pane fade" id="consultaIndividual">
            <div id="consultaContent"></div>
        </div>

        <!-- PAGAMENTOS -->
        <div class="tab-pane fade" id="pagamentos">
            <div id="pagamentosContent"></div>
        </div>

        <!-- DOWNLOADS -->
        <div class="tab-pane fade" id="downloads">
            <div id="downloadsContent"></div>
        </div>
    </div>
</div>

<!-- MODAL CONVÊNIO -->
<div class="modal fade" id="modalConvenio" tabindex="-1">
    <div class="modal-dialog modal-full-custom modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header" style="background: var(--primary-dark); color: white;">
                <h5 class="modal-title"><i class="material-icons me-2">description</i>Detalhes Completos do Convênio</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalConvenioBody"></div>
        </div>
    </div>
</div>

<!-- MODAL EXECUÇÃO -->
<div class="modal fade" id="modalExecucao" tabindex="-1">
    <div class="modal-dialog modal-full-custom modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header" style="background: var(--primary-dark); color: white;">
                <h5 class="modal-title"><i class="material-icons me-2">receipt</i>Detalhes da Execução Financeira</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalExecucaoBody"></div>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURAÇÕES GLOBAIS ====================
    const BASE_URL_CONV = 'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/main/dataset/data/convenios.csv';
    let dadosConvenios = [];
    let dadosExecucao = {};
    let conveniosFiltrados = [];
    let pagamentosFiltrados = [];
    
    // Ordenação
    let sortConfig = { column: 'valor_total_convenio_r', direction: 'desc' };
    let sortConfigCI = { column: 'codigo_siafi', direction: 'asc' };
    let sortConfigPag = { column: 'ano_empenho', direction: 'desc' };
    
    // Paginação
    let paginaAtualVG = 1, itensPorPaginaVG = 8;
    let paginaAtualCI = 1, itensPorPaginaCI = 10;
    let paginaAtualPag = 1, itensPorPaginaPag = 10;
    
    // Colunas selecionáveis para Consulta Individual
    let colunasSelecionadas = {
        instrumento: true, titulo: true, proponente: true, concedente: true,
        esfera_concedente: false, situacao: true, tipo_contrapartida: false,
        data_inicio: false, data_fim: false, valor_proponente: true,
        valor_concedente: true, objeto: false
    };
    
    let chartOrgaos = null, chartSituacao = null;
    
    document.getElementById('dataAtualizacao').innerText = new Date().toLocaleDateString('pt-BR');
    
    // ==================== CARREGAMENTO DE DADOS ====================
    async function carregarDados() {
        await carregarConvenios();
        for (let ano of ['2026', '2025', '2024', '2023', '2022', '2021']) {
            await carregarExecucaoPorAno(ano);
        }
        renderizarVisaoGeral();
        renderizarConsultaIndividual();
        renderizarPagamentos();
        renderizarDownloads();
    }
    
    function carregarConvenios() {
        return new Promise((resolve) => {
            Papa.parse(BASE_URL_CONV, {
                download: true, header: true, delimiter: ';', skipEmptyLines: true,
                complete: function(res) {
                    dadosConvenios = res.data.map(row => ({
                        ...row,
                        valor_total_convenio_r: parseFloat((row.valor_total_convenio_r || '0').replace(',', '.')) || 0,
                        valor_concedente_r: parseFloat((row.valor_concedente_r || '0').replace(',', '.')) || 0,
                        valor_proponente_r: parseFloat((row.valor_proponente_r || '0').replace(',', '.')) || 0,
                        ano_conv: row.data_assinatura ? row.data_assinatura.split('/')[2] : '',
                        tipo_contrapartida_sim: row.tipo_de_contrapartida && row.tipo_de_contrapartida !== 'Sem contrapartida' ? 'Sim' : 'Não'
                    }));
                    resolve();
                }
            });
        });
    }
    
    async function carregarExecucaoPorAno(ano) {
        if (dadosExecucao[ano]) return;
        const url = `https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/main/dataset/data/execucao${ano}.csv`;
        return new Promise((resolve) => {
            Papa.parse(url, {
                download: true, header: true, delimiter: ';', skipEmptyLines: true,
                complete: function(res) {
                    dadosExecucao[ano] = (res.data || []).map(row => ({
                        uo: row.uo, tipo_siafi: row.tipo_siafi, no_siafi: row.no_siafi,
                        ano_empenho: row.ano_empenho, no_empenho: row.no_empenho, ue: row.ue,
                        data_empenho: row.data_empenho, acao: row.acao, c: row.c, g: row.g, m: row.m,
                        ed: row.ed, id: row.id, natureza_dea: row.natureza_dea, ed_dea: row.ed_dea,
                        f: row.f, p: row.p,
                        valor_empenhado_r: parseFloat((row.valor_empenhado_r || '0').replace(',', '.')) || 0,
                        valor_liquidado_r: parseFloat((row.valor_liquidado_r || '0').replace(',', '.')) || 0,
                        valor_pago_r: parseFloat((row.valor_pago_r || '0').replace(',', '.')) || 0,
                        cnpj_cpf_credor: row.cnpj_cpf_credor, razao_social_credor: row.razao_social_credor
                    }));
                    resolve();
                },
                error: () => { dadosExecucao[ano] = []; resolve(); }
            });
        });
    }
    
    function getLinkDocumento(conv) {
        return conv.inteiro_teor_do_instrumento_sigcon || conv.inteiro_teor_do_instrumento_transferegov || conv.doc_autorizativo || null;
    }
    
    // ==================== ORDENAÇÃO ====================
    function ordenarDados(dados, config, tipoMap = {}) {
        return [...dados].sort((a, b) => {
            let valA = a[config.column];
            let valB = b[config.column];
            
            if (tipoMap[config.column] === 'number' || config.column.includes('valor') || config.column === 'totalConv') {
                valA = parseFloat(valA) || 0;
                valB = parseFloat(valB) || 0;
            } else {
                valA = (valA || '').toString().toLowerCase();
                valB = (valB || '').toString().toLowerCase();
            }
            
            if (valA < valB) return config.direction === 'asc' ? -1 : 1;
            if (valA > valB) return config.direction === 'asc' ? 1 : -1;
            return 0;
        });
    }
    
    function toggleSort(column, tipo, isVG = false) {
        if (isVG) {
            if (sortConfig.column === column) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.column = column;
                sortConfig.direction = 'asc';
            }
            renderizarVisaoGeral();
        } else {
            if (sortConfigCI.column === column) {
                sortConfigCI.direction = sortConfigCI.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfigCI.column = column;
                sortConfigCI.direction = 'asc';
            }
            renderizarConsultaIndividual();
        }
    }
    
    // ==================== VISÃO GERAL ====================
    function agruparPorConvenente(dados) {
        const mapa = new Map();
        dados.forEach(c => {
            const convenente = c.concedente || 'Não informado';
            if (!mapa.has(convenente)) {
                mapa.set(convenente, { convenente, totalConv: 0, valorTotal: 0 });
            }
            const item = mapa.get(convenente);
            item.totalConv++;
            item.valorTotal += c.valor_total_convenio_r;
        });
        return ordenarDados(Array.from(mapa.values()), { column: 'valorTotal', direction: 'desc' }, { valorTotal: 'number' });
    }
    
    function renderizarVisaoGeral() {
        let filtrados = [...dadosConvenios];
        const ano = document.getElementById('filtroAnoVG')?.value;
        if (ano && ano !== 'todos') filtrados = filtrados.filter(c => c.ano_conv === ano);
        const situacao = document.getElementById('filtroSituacaoVG')?.value;
        if (situacao) filtrados = filtrados.filter(c => c.situacao === situacao);
        const convenente = document.getElementById('filtroConvenenteVG')?.value.toLowerCase();
        if (convenente) filtrados = filtrados.filter(c => (c.concedente || '').toLowerCase().includes(convenente));
        
        let agrupado = agruparPorConvenente(filtrados);
        agrupado = ordenarDados(agrupado, sortConfig, { valorTotal: 'number' });
        
        const totalGeral = agrupado.reduce((acc, i) => acc + i.valorTotal, 0);
        const totalConv = agrupado.reduce((acc, i) => acc + i.totalConv, 0);
        
        const inicio = (paginaAtualVG - 1) * itensPorPaginaVG;
        const paginaDados = agrupado.slice(inicio, inicio + itensPorPaginaVG);
        
        const html = `
            <div class="filter-container">
                <div class="row g-3">
                    <div class="col-md-3"><label class="filter-label">Ano</label><select class="form-select" id="filtroAnoVG"><option value="todos">Todos</option><option value="2026" selected>2026</option><option>2025</option><option>2024</option><option>2023</option><option>2022</option><option>2021</option></select></div>
                    <div class="col-md-3"><label class="filter-label">Situação</label><select class="form-select" id="filtroSituacaoVG"><option value="">Todas</option><option>VIGENTE</option><option>VENCIDO</option></select></div>
                    <div class="col-md-3"><label class="filter-label">Convenente</label><input type="text" class="form-control" id="filtroConvenenteVG" placeholder="Digite o nome..."></div>
                    <div class="col-md-3"><button class="btn-primary-custom w-100" onclick="renderizarVisaoGeral()"><i class="material-icons">search</i> Filtrar</button></div>
                </div>
            </div>
            <div class="row mb-4">
                <div class="col-md-4"><div class="metric-card"><div class="metric-value">${totalConv.toLocaleString()}</div><div>Total de Convênios</div></div></div>
                <div class="col-md-4"><div class="metric-card"><div class="metric-value">R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><div>Valor Total</div></div></div>
                <div class="col-md-4"><div class="metric-card"><div class="metric-value">${agrupado.length}</div><div>Convenentes</div></div></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6"><canvas id="chartOrgaosVG" style="max-height: 280px;"></canvas></div>
                <div class="col-md-6"><canvas id="chartSituacaoVG" style="max-height: 280px;"></canvas></div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div><button class="btn-export" onclick="exportarVGCSV()"><i class="material-icons">description</i> CSV</button><button class="btn-export ms-2" onclick="exportarVGPDF()"><i class="material-icons">print</i> PDF</button></div>
                <span class="table-badge">${agrupado.length} convenentes</span>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr><th onclick="toggleSort('convenente', 'text', true)">Convenente ${sortConfig.column === 'convenente' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : '↕'}</th>
                        <th onclick="toggleSort('totalConv', 'number', true)">Total Convênios ${sortConfig.column === 'totalConv' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : '↕'}</th>
                        <th onclick="toggleSort('valorTotal', 'number', true)">Valor Total (R$) ${sortConfig.column === 'valorTotal' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : '↕'}</th></tr>
                    </thead>
                    <tbody>
                        ${paginaDados.map(item => `<tr><td><a class="orgao-link" onclick="irParaConsulta('${item.convenente.replace(/'/g, "\\'")}')">${item.convenente}</a></td><td>${item.totalConv.toLocaleString()}</td><td>R$ ${item.valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td></tr>`).join('')}
                    </tbody>
                    <tfoot><tr class="total-footer"><td><strong>Total Geral</strong></td><td><strong>${agrupado.reduce((a, i) => a + i.totalConv, 0).toLocaleString()}</strong></td><td><strong>R$ ${agrupado.reduce((a, i) => a + i.valorTotal, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td></tr></tfoot>
                </table>
            </div>
            <div class="pagination-container" id="paginacaoVG"></div>
        `;
        
        document.getElementById('visaoGeralContent').innerHTML = html;
        renderizarPaginacaoVG(agrupado.length);
        atualizarGraficosVG(agrupado, filtrados);
    }
    
    function atualizarGraficosVG(agrupado, filtrados) {
        const topOrgaos = agrupado.slice(0, 6);
        const ctxOrgaos = document.getElementById('chartOrgaosVG')?.getContext('2d');
        if (ctxOrgaos) {
            if (chartOrgaos) chartOrgaos.destroy();
            chartOrgaos = new Chart(ctxOrgaos, {
                type: 'bar', data: { labels: topOrgaos.map(o => o.convenente.length > 20 ? o.convenente.substring(0, 20) + '...' : o.convenente),
                datasets: [{ label: 'Valor Total (R$ Milhões)', data: topOrgaos.map(o => o.valorTotal / 1e6), backgroundColor: '#1a3a5c' }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
        const situacaoCount = { Vigente: filtrados.filter(c => c.situacao === 'VIGENTE').length, Vencido: filtrados.filter(c => c.situacao === 'VENCIDO').length };
        const ctxSit = document.getElementById('chartSituacaoVG')?.getContext('2d');
        if (ctxSit) {
            if (chartSituacao) chartSituacao.destroy();
            chartSituacao = new Chart(ctxSit, { type: 'pie', data: { labels: ['Vigente', 'Vencido'], datasets: [{ data: [situacaoCount.Vigente, situacaoCount.Vencido], backgroundColor: ['#28a745', '#dc3545'] }] } });
        }
    }
    
    function renderizarPaginacaoVG(totalItens) {
        const container = document.getElementById('paginacaoVG');

        if (document.getElementById('filtroContrapartidaCI')?.value) filtrados = filtrados.filter(c => c.tipo_contrapartida_sim === document.getElementById('filtroContrapartidaCI').value);
        if (document.getElementById('filtroUOCI')?.value) filtrados = filtrados.filter(c => c.unidade_orcamentaria === document.getElementById('filtroUOCI').value);
        if (document.getElementById('filtroProponenteCI')?.value) filtrados = filtrados.filter(c => (c.proponente || '').toLowerCase().includes(document.getElementById('filtroProponenteCI').value.toLowerCase()));
        if (document.getElementById('filtroConcedenteCI')?.value) filtrados = filtrados.filter(c => (c.concedente || '').toLowerCase().includes(document.getElementById('filtroConcedenteCI').value.toLowerCase()));

    function montarCabecalhoCI() {
        let html = '<tr>';
        html += `<th onclick="toggleSort('codigo_siafi', 'text', false)">Código SIAFI ${sortConfigCI.column === 'codigo_siafi' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.instrumento) html += `<th onclick="toggleSort('instrumento', 'text', false)">Instrumento ${sortConfigCI.column === 'instrumento' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.titulo) html += `<th onclick="toggleSort('titulo', 'text', false)">Título ${sortConfigCI.column === 'titulo' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.proponente) html += `<th onclick="toggleSort('proponente', 'text', false)">Proponente ${sortConfigCI.column === 'proponente' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.concedente) html += `<th onclick="toggleSort('concedente', 'text', false)">Concedente ${sortConfigCI.column === 'concedente' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.esfera_concedente) html += `<th onclick="toggleSort('esfera_concedente', 'text', false)">Esfera ${sortConfigCI.column === 'esfera_concedente' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.situacao) html += `<th onclick="toggleSort('situacao', 'text', false)">Situação ${sortConfigCI.column === 'situacao' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.tipo_contrapartida) html += `<th onclick="toggleSort('tipo_contrapartida_sim', 'text', false)">Contrapartida ${sortConfigCI.column === 'tipo_contrapartida_sim' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.data_inicio) html += `<th onclick="toggleSort('inicio_vigencia', 'text', false)">Início Vigência ${sortConfigCI.column === 'inicio_vigencia' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.data_fim) html += `<th onclick="toggleSort('termino_vigencia', 'text', false)">Fim Vigência ${sortConfigCI.column === 'termino_vigencia' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        html += `<th onclick="toggleSort('valor_total_convenio_r', 'number', false)">Valor Total (R$) ${sortConfigCI.column === 'valor_total_convenio_r' ? (sortConfigCI.direction === 'asc' ? '↑' : '↓') : '↕'}</th>`;
        if (colunasSelecionadas.valor_proponente) html += `<th>Valor Proponente</th>`;

        if (colunasSelecionadas.objeto) html += `<th>Objeto</th>`;
        html += `<th>Ações</th></tr>`;
        return html;
    }
    
    function montarLinhaCI(c) {
        const linkDoc = getLinkDocumento(c);
        const siafiDisplay = linkDoc ? `<a href="${linkDoc}" target="_blank" class="siafi-link">${c.codigo_siafi || '-'}</a>` : (c.codigo_siafi || '-');
        let html = `<tr><td>${siafiDisplay}</td>`;
        if (colunasSelecionadas.instrumento) html += `<td>${c.instrumento || '-'}</td>`;
        if (colunasSelecionadas.titulo) html += `<td style="max-width:200px;">${(c.titulo || '').substring(0, 50)}${(c.titulo || '').length > 50 ? '...' : ''}</td>`;
        if (colunasSelecionadas.proponente) html += `<td style="max-width:150px;">${c.proponente || '-'}</td>`;
        if (colunasSelecionadas.concedente) html += `<td style="max-width:150px;">${c.concedente || '-'}</td>`;
        if (colunasSelecionadas.esfera_concedente) html += `<td>${c.esfera_concedente || '-'}</td>`;
        if (colunasSelecionadas.situacao) html += `<td><span class="badge-status ${c.situacao === 'VIGENTE' ? 'badge-vigente' : 'badge-vencido'}">${c.situacao || '-'}</span></td>`;
        if (colunasSelecionadas.tipo_contrapartida) html += `<td>${c.tipo_contrapartida_sim || '-'}</td>`;
        if (colunasSelecionadas.data_inicio) html += `<td>${c.inicio_vigencia || '-'}</td>`;
        if (colunasSelecionadas.data_fim) html += `<td>${c.termino_vigencia || '-'}</td>`;
        html += `<td>R$ ${(c.valor_total_convenio_r || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>`;
        if (colunasSelecionadas.valor_proponente) html += `<td>R$ ${(c.valor_proponente_r || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>`;
        if (colunasSelecionadas.valor_concedente) html += `<td>R$ ${(c.valor_concedente_r || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>`;
        if (colunasSelecionadas.objeto) html += `<td style="max-width:250px;">${(c.objeto || '').substring(0, 80)}${(c.objeto || '').length > 80 ? '...' : ''}</td>`;
        html += `<td><button class="btn-action" onclick='verDetalhesCompletos(${JSON.stringify(c).replace(/'/g, "\\'")})'><i class="material-icons">visibility</i></button></td></tr>`;
        return html;
    }
    
    function montarRodapeCI() {
        let html = '<tr class="total-footer"><td><strong>Total Geral</strong></td>';
        if (colunasSelecionadas.instrumento) html += '<td></td>';
        if (colunasSelecionadas.titulo) html += '<td></td>';
        if (colunasSelecionadas.proponente) html += '<td></td>';
        if (colunasSelecionadas.concedente) html += '<td></td>';
        if (colunasSelecionadas.esfera_concedente) html += '<td></td>';
        if (colunasSelecionadas.situacao) html += '<td></td>';
        if (colunasSelecionadas.tipo_contrapartida) html += '<td></td>';
        if (colunasSelecionadas.data_inicio) html += '<td></td>';
        if (colunasSelecionadas.data_fim) html += '<td></td>';
        html += `<td><strong>R$ ${conveniosFiltrados.reduce((a, b) => a + b.valor_total_convenio_r, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>`;
        if (colunasSelecionadas.valor_proponente) html += `<td><strong>R$ ${conveniosFiltrados.reduce((a, b) => a + b.valor_proponente_r, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>`;
        if (colunasSelecionadas.valor_concedente) html += `<td><strong>R$ ${conveniosFiltrados.reduce((a, b) => a + b.valor_concedente_r, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>`;
        if (colunasSelecionadas.objeto) html += '<td></td>';
        html += '<td></td></tr>';
        return html;
    }
    
    window.toggleColuna = function(coluna) {
        colunasSelecionadas[coluna] = !colunasSelecionadas[coluna];

    window.aplicarFiltrosCI = function() { paginaAtualCI = 1; renderizarConsultaIndividual(); };
    window.limparFiltrosCI = function() {
        ['filtroSiafiCI', 'filtroAnoCI', 'filtroSituacaoCI', 'filtroInstrumentoCI', 'filtroEsferaCI', 'filtroContrapartidaCI', 'filtroUOCI', 'filtroProponenteCI', 'filtroConcedenteCI', 'filtroObjetoCI'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';

        paginaAtualCI = 1;
        renderizarConsultaIndividual();
    };

    function toggleSortPag(column, tipo) {
        if (sortConfigPag.column === column) {
            sortConfigPag.direction = sortConfigPag.direction === 'asc' ? 'desc' : 'asc';
        } else {
            sortConfigPag.column = column;
            sortConfigPag.direction = 'asc';
        }
        buscarPagamentos();
    }
    
    window.buscarPagamentos = async function() {
        const siafi = document.getElementById('filtroSiafiPag')?.value.trim();
        const anoEmpenho = document.getElementById('filtroAnoEmpenhoPag')?.value;
        const numEmpenho = document.getElementById('filtroNumEmpenhoPag')?.value.trim();
        const uo = document.getElementById('filtroUOPag')?.value.trim();
        
        let pagamentos = [];
        const anos = anoEmpenho ? [anoEmpenho] : ['2026', '2025', '2024', '2023', '2022', '2021'];
        for (const ano of anos) {
            if (dadosExecucao[ano]) {
                let execs = [...dadosExecucao[ano]];
                if (siafi) execs = execs.filter(e => e.no_siafi === siafi);
                if (numEmpenho) execs = execs.filter(e => e.no_empenho === numEmpenho);
                if (uo) execs = execs.filter(e => e.uo === uo);
                pagamentos.push(...execs);
            }
        }
        
        const situacao = document.getElementById('filtroSituacaoPag')?.value;
        const proponente = document.getElementById('filtroProponentePag')?.value.toLowerCase();
        const concedente = document.getElementById('filtroConcedentePag')?.value.toLowerCase();
        
        if (situacao || proponente || concedente) {
            const convFiltrados = dadosConvenios.filter(c => {
                if (situacao && c.situacao !== situacao) return false;
                if (proponente && !(c.proponente || '').toLowerCase().includes(proponente)) return false;
                if (concedente && !(c.concedente || '').toLowerCase().includes(concedente)) return false;
                return true;
            });
            const siafisValidos = new Set(convFiltrados.map(c => c.codigo_siafi));
            pagamentos = pagamentos.filter(p => siafisValidos.has(p.no_siafi));
        }
        
        pagamentosFiltrados = ordenarDados(pagamentos, sortConfigPag, { valor_empenhado_r: 'number', valor_liquidado_r: 'number', valor_pago_r: 'number' });
        const totalEmpenhado = pagamentosFiltrados.reduce((s, p) => s + p.valor_empenhado_r, 0);
        const totalPago = pagamentosFiltrados.reduce((s, p) => s + p.valor_pago_r, 0);
        
        document.getElementById('resumoPagamento').innerHTML = `
            <div class="col-md-4"><div class="metric-card"><div class="metric-value">R$ ${totalEmpenhado.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><div>Total Empenhado</div></div></div>
            <div class="col-md-4"><div class="metric-card"><div class="metric-value">R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><div>Total Pago</div></div></div>
            <div class="col-md-4"><div class="metric-card"><div class="metric-value">${pagamentosFiltrados.length}</div><div>Empenhos</div></div></div>
        `;
        document.getElementById('totalPagamentosBadge').innerText = `${pagamentosFiltrados.length} empenhos`;
        
        const inicio = (paginaAtualPag - 1) * itensPorPaginaPag;
        const pagina = pagamentosFiltrados.slice(inicio, inicio + itensPorPaginaPag);
        document.getElementById('tbodyPag').innerHTML = pagina.map(p => `
            <tr><td>${p.no_siafi || '-'}</td><td>${p.no_empenho || '-'}</td><td>${p.ano_empenho || '-'}</td>
            <td>${p.data_empenho || '-'}</td><td style="max-width:200px;">${(p.razao_social_credor || '').substring(0, 30)}</td>
            <td>${p.cnpj_cpf_credor || '-'}</td><td>R$ ${(p.valor_empenhado_r || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            <td>R$ ${(p.valor_liquidado_r || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            <td>R$ ${(p.valor_pago_r || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            <td>${p.valor_empenhado_r ? ((p.valor_pago_r / p.valor_empenhado_r) * 100).toFixed(1) + '%' : '0%'}</td>
            <td><button class="btn-action" onclick='verDetalhesExecucao(${JSON.stringify(p).replace(/'/g, "\\'")})'><i class="material-icons">visibility</i></button></td></tr>
        `).join('');
        
        document.getElementById('tfootPag').innerHTML = `<tr class="total-footer"><td colspan="6"><strong>Totais</strong></td>
            <td><strong>R$ ${pagamentosFiltrados.reduce((a, b) => a + b.valor_empenhado_r, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>
            <td><strong>R$ ${pagamentosFiltrados.reduce((a, b) => a + b.valor_liquidado_r, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>
            <td><strong>R$ ${pagamentosFiltrados.reduce((a, b) => a + b.valor_pago_r, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>
            <td colspan="2"></td></tr>`;
        
        const totalPaginas = Math.ceil(pagamentosFiltrados.length / itensPorPaginaPag);
        document.getElementById('paginacaoPag').innerHTML = `<div class="d-flex justify-content-between"><button class="btn btn-sm btn-outline-secondary" onclick="paginaAtualPag--; buscarPagamentos()" ${paginaAtualPag === 1 ? 'disabled' : ''}>Anterior</button><span>Pág ${paginaAtualPag} de ${totalPaginas || 1}</span><button class="btn btn-sm btn-outline-secondary" onclick="paginaAtualPag++; buscarPagamentos()" ${paginaAtualPag === totalPaginas ? 'disabled' : ''}>Próximo</button></div>`;
    };
    
    window.limparFiltrosPag = function() {
        ['filtroSiafiPag', 'filtroAnoEmpenhoPag', 'filtroNumEmpenhoPag', 'filtroUOPag', 'filtroSituacaoPag', 'filtroProponentePag', 'filtroConcedentePag'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        paginaAtualPag = 1;
        buscarPagamentos();
    };

    window.baixarDadosAno = function() {
        const ano = document.getElementById('anoDownload')?.value;
        const formato = document.getElementById('formatoDownload')?.value;
        if (!ano) { alert('Selecione um ano'); return; }
        const dadosAno = dadosConvenios.filter(c => c.ano_conv === ano);
        if (dadosAno.length === 0) { alert('Nenhum dado encontrado'); return; }
        
        if (formato === 'csv') {
            const cabecalhos = ['codigo_siafi', 'instrumento', 'titulo', 'proponente', 'concedente', 'situacao', 'valor_total_convenio_r', 'objeto'];
            const linhas = dadosAno.map(item => cabecalhos.map(cab => `"${(item[cab] || '').toString().replace(/"/g, '""')}"`).join(';'));
            const csv = [cabecalhos.join(';'), ...linhas].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `convenios_${ano}.csv`;
            link.click();
        } else {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });
            const dados = dadosAno.map(c => [c.codigo_siafi || '-', c.instrumento || '-', (c.titulo || '').substring(0, 40), c.proponente || '-', c.concedente || '-', c.situacao || '-', `R$ ${(c.valor_total_convenio_r || 0).toLocaleString('pt-BR')}`]);
            doc.autoTable({ head: [['SIAFI', 'Instrumento', 'Título', 'Proponente', 'Concedente', 'Situação', 'Valor Total']], body: dados, styles: { fontSize: 8 }, headStyles: { fillColor: [26, 58, 92] } });
            doc.save(`convenios_${ano}.pdf`);
        }
    };
    
    // ==================== EXPORTAÇÕES ====================
    function exportarVGCSV() { exportarTabelaCSV('visaoGeral table', 'visao_geral_convenentes'); }
    function exportarVGPDF() { exportarTabelaPDF('visaoGeral table', 'visao_geral_convenentes'); }
    function exportarCICSV() { exportarTabelaCSV('consultaIndividual table', 'consulta_convenios'); }
    function exportarCIPDF() { exportarTabelaPDF('consultaIndividual table', 'consulta_convenios'); }
    function exportarPagCSV() { exportarTabelaCSV('pagamentos table', 'pagamentos_convenios'); }
    function exportarPagPDF() { exportarTabelaPDF('pagamentos table', 'pagamentos_convenios'); }
    
    function exportarTabelaCSV(selector, fileName) {
        const table = document.querySelector(`#${selector.includes(' ') ? selector.split(' ')[0] : selector} table`);
        if (!table) return;
        let csv = [];
        table.querySelectorAll('tr').forEach(row => {
            const cols = row.querySelectorAll('th, td');
            const rowData = Array.from(cols).map(col => `"${col.innerText.replace(/"/g, '""')}"`).join(';');
            csv.push(rowData);
        });
        const blob = new Blob(['\uFEFF' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${fileName}_${new Date().toISOString().slice(0, 10)}.csv`;
        link.click();
    }
    
    function exportarTabelaPDF(selector, fileName) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape' });
        const table = document.querySelector(`#${selector.includes(' ') ? selector.split(' ')[0] : selector} table`);
        if (!table) return;
        const rows = [];
        table.querySelectorAll('tr').forEach(tr => {
            const row = [];
            tr.querySelectorAll('th, td').forEach(cell => row.push(cell.innerText));
            if (row.some(c => c.trim())) rows.push(row);
        });
        if (rows.length > 0) {
            doc.autoTable({ head: [rows[0]], body: rows.slice(1), styles: { fontSize: 8 }, headStyles: { fillColor: [26, 58, 92] } });
            doc.save(`${fileName}_${new Date().toISOString().slice(0, 10)}.pdf`);
        }
    }
