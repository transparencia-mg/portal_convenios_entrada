        .btn-action:hover { background-color: #1a3a5c; color: white; }

        .orgao-link:hover, .siafi-link:hover { color: var(--accent-red); text-decoration: underline; }
        .table-container { overflow-x: auto; border-radius: 10px; background: white; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }

        .modal-creative .modal-header { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%); color: white; }
        .column-selector-icon { position: relative; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; background: #eeeff5; border: 1px solid #d6dee6; border-radius: 20px; padding: 4px 10px; height: 32px; font-size: 12px; }
        .column-selector-popup { display: none; position: absolute; right: 0; top: 35px; background: white; border: 1px solid #dee2e6; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); width: 260px; z-index: 1000; padding: 12px; }
        .column-selector-popup.show { display: block; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; }

<script>
let conveniosData = [];
let execucaoData = [];
let arrecadacaoData = [];
let siafiValidosSet = new Set();

const CONVENIOS_URL = 'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/convenios.csv';
const ARRECADACAO_URL = 'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/arrecadacao.csv';
const EXECUCAO_URLS = [
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2026.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2025.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2024.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2023.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2022.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2021.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2020.csv'
];

let filtrosFormalizados = { ano: '', proponente: '' };
let filtrosIndividual = { ano: '', codigoSiafi: '', codigoSigcon: '', instrumento: '', proponente: '', concedente: '', situacao: '' };
let filtrosExecucao = { ano: '', numeroSiafi: '', anoEmpenho: '', numeroEmpenho: '' };
let filtrosArrecadacao = { ano: '', numeroSiafi: '', tipoReceita: '', fonte: '' };

let paginaAtual = { formalizados: 1, individual: 1, execucao: 1, arrecadacao: 1 };
let itensPorPagina = 25;
let buscaIndividual = '';
let buscaExecucao = '';
let buscaArrecadacao = '';

let ordenacaoFormalizados = { coluna: 'proponente', direcao: 'asc' };
let ordenacaoIndividual = { coluna: 'proponente', direcao: 'asc' };
let ordenacaoExecucao = { coluna: 'no_siafi', direcao: 'asc' };
let ordenacaoArrecadacao = { coluna: 'no_siafi', direcao: 'asc' };

let colunasVisiveisIndividual = {
    codigo_siafi: true, codigo_sigcon: true, sei: true, instrumento: true,
    proponente: true, concedente: true, esfera_concedente: true, objeto: false,
    situacao: true, tipo_contrapartida: true, data_assinatura: true, data_publicacao: true,
    inicio_vigencia: true, termino_vigencia: true
};

let colunasVisiveisExecucao = {
    no_siafi: true, proponente: true, concedente: true, situacao_convenio: true,
    no_empenho: true, razao_social_credor: true, cnpj_cpf_credor: true,
    valor_empenhado: true, valor_liquidado: true, valor_pago: true
};

let colunasVisiveisArrecadacao = {
    no_siafi: true, unidade_orcamentaria: true, ano_exercicio_receita: true,
    codigo_classificacao_receita: true, tipo_de_receita: true, fonte: true,
    data_da_arrecadacao: true, receita_arrecadada: true, tipo_siafi: true, 
    classificacao_receita: true, registro_receita: true
};

const ordemColunasIndividual = ['codigo_siafi', 'codigo_sigcon', 'sei', 'instrumento', 'proponente', 'concedente', 'esfera_concedente', 'objeto', 'situacao', 'tipo_contrapartida', 'data_assinatura', 'data_publicacao', 'inicio_vigencia', 'termino_vigencia'];
const ordemColunasExecucao = ['no_siafi', 'proponente', 'concedente', 'situacao_convenio', 'no_empenho', 'razao_social_credor', 'cnpj_cpf_credor', 'valor_empenhado', 'valor_liquidado', 'valor_pago'];
const ordemColunasArrecadacao = ['no_siafi', 'unidade_orcamentaria', 'ano_exercicio_receita', 'codigo_classificacao_receita', 'tipo_de_receita', 'fonte', 'data_da_arrecadacao', 'receita_arrecadada', 'tipo_siafi', 'classificacao_receita', 'registro_receita'];

function mostrarLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

function formatarMoeda(valor) {
    if (!valor && valor !== 0) return 'R$ 0,00';
    let num = typeof valor === 'string' ? parseFloat(valor.replace(/\./g, '').replace(',', '.')) : valor;
    if (isNaN(num)) num = 0;
    return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function formatarData(dataStr) {
    if (!dataStr || dataStr === '') return '-';
    let dataLimpa = dataStr.split(' ')[0];
    if (dataLimpa.includes('/')) return dataLimpa;
    const partes = dataLimpa.split('-');
    if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
    return dataLimpa;
}

function getLinkInteiroTeor(item) {
    if (item.inteiro_teor_do_instrumento_sigcon && item.inteiro_teor_do_instrumento_sigcon !== '' && item.inteiro_teor_do_instrumento_sigcon !== '#') {
        return item.inteiro_teor_do_instrumento_sigcon;
    }
    if (item.inteiro_teor_do_instrumento_transferegov && item.inteiro_teor_do_instrumento_transferegov !== '' && item.inteiro_teor_do_instrumento_transferegov !== '#') {
        return item.inteiro_teor_do_instrumento_transferegov;
    }
    return null;
}

function getAnoFromData(dataStr) {
    if (!dataStr || dataStr === '') return null;
    let dataLimpa = dataStr.split(' ')[0];
    if (dataLimpa.includes('/')) {
        const partes = dataLimpa.split('/');
        if (partes.length === 3) return partes[2];
    } else if (dataLimpa.includes('-')) {
        const partes = dataLimpa.split('-');
        if (partes.length === 3) return partes[0];
    }
    return null;
}

function parseCSV(texto) {
    const linhas = texto.trim().split('\n');
    let cabecalhos = linhas[0].split(';').map(h => h.trim().replace(/^\uFEFF/, '').replace(/^["']|["']$/g, '').toLowerCase().replace(/ /g, '_').replace(/\(|\)/g, '').replace(/_r$/, ''));
    
    // CORREÇÃO: Remove o BOM do primeiro cabeçalho se existir
    if (cabecalhos[0] && cabecalhos[0].charCodeAt(0) === 65279) {
        cabecalhos[0] = cabecalhos[0].substring(1);
    }
    
    // Se o primeiro cabeçalho ainda estiver vazio ou for 'uo' com problema, força o nome correto
    if (cabecalhos[0] === '' || cabecalhos[0] === 'ï»¿') {
        cabecalhos[0] = 'uo';
    }
    
    const dados = [];
    for (let i = 1; i < linhas.length; i++) {
        if (!linhas[i].trim()) continue;
        const valores = [];
        let campoAtual = '';
        let dentroAspas = false;
        for (let char of linhas[i]) {
            if (char === '"') dentroAspas = !dentroAspas;
            else if (char === ';' && !dentroAspas) { valores.push(campoAtual); campoAtual = ''; }
            else campoAtual += char;
        }
        valores.push(campoAtual);
        
        const linha = {};
        cabecalhos.forEach((cab, idx) => {
            let valor = valores[idx] || '';
            valor = valor.replace(/^["']|["']$/g, '').trim();
            if (cab.includes('valor') && valor) valor = parseFloat(valor.replace(/\./g, '').replace(',', '.')) || 0;
            linha[cab] = valor;
        });
        dados.push(linha);
    }
    return dados;
}

async function carregarDados() {
    mostrarLoading(true);
    try {
        const conveniosResp = await fetch(CONVENIOS_URL);
        if (conveniosResp.ok) {
            const texto = await conveniosResp.text();
            conveniosData = parseCSV(texto);
            conveniosData.forEach(c => {
                if (!c.ano && c.data_assinatura) {
                    c.ano = getAnoFromData(c.data_assinatura);
                }
            });
            console.log(`Convênios carregados: ${conveniosData.length}`);
            
            siafiValidosSet.clear();
            conveniosData.forEach(c => {
                if (c.codigo_siafi && c.codigo_siafi.trim() !== '') {
                    siafiValidosSet.add(c.codigo_siafi.trim());
                }
            });
            console.log(`Total de SIAFIs únicos e válidos encontrados: ${siafiValidosSet.size}`);
        }
        
        for (const url of EXECUCAO_URLS) {
            try {
                const resp = await fetch(url);
                if (resp.ok) {
                    const texto = await resp.text();
                    const dados = parseCSV(texto);
                    const dadosFiltrados = dados.filter(d => siafiValidosSet.has(d.no_siafi?.trim()));
                    execucaoData = [...execucaoData, ...dadosFiltrados];
                    console.log(`Carregado: ${url.split('/').pop()} - ${dados.length} registros, ${dadosFiltrados.length} mantidos`);
                }
            } catch(e) { console.log(`Erro: ${url}`); }
        }
        console.log(`Execução total após filtro: ${execucaoData.length}`);
        
        const arrecResp = await fetch(ARRECADACAO_URL);
        if (arrecResp.ok) {
            const texto = await arrecResp.text();
            const dados = parseCSV(texto);
            arrecadacaoData = dados.filter(d => siafiValidosSet.has(d.no_siafi?.trim()));
            console.log(`Arrecadação carregada: ${dados.length} registros, ${arrecadacaoData.length} mantidos`);
        }
        
        renderizarFormalizados();
        renderizarIndividual();
        renderizarExecucao();
        renderizarArrecadacao();
        renderizarDownloads();
    } catch(erro) { console.error(erro); }
    finally { mostrarLoading(false); }
}

function ordenarDados(dados, coluna, direcao, tipo) {
    return [...dados].sort((a, b) => {
        let valA = a[coluna] || '';
        let valB = b[coluna] || '';
        if (tipo === 'numero' || tipo === 'moeda') {
            valA = parseFloat(valA) || 0;
            valB = parseFloat(valB) || 0;
        } else {
            valA = String(valA).toLowerCase();
            valB = String(valB).toLowerCase();
        }
        if (direcao === 'asc') return valA > valB ? 1 : -1;
        return valA < valB ? 1 : -1;
    });
}

function criarSelectComBusca(id, opcoes, valorAtual, placeholder) {
    const opcoesUnicas = [...new Set(opcoes.filter(o => o && o !== ''))].sort();
    return `
        <div class="select-with-search">
            <input type="text" id="${id}_input" class="form-control" placeholder="${placeholder}" value="${valorAtual || ''}" autocomplete="off">
            <div id="${id}_options" class="select-options">
                <div class="select-option" data-value="">Todos</div>
                ${opcoesUnicas.map(o => `<div class="select-option" data-value="${o.replace(/"/g, '&quot;')}">${o}</div>`).join('')}
            </div>
        </div>
    `;
}

function initSelectComBusca(id, callback) {
    const input = document.getElementById(`${id}_input`);
    const optionsDiv = document.getElementById(`${id}_options`);
    if (!input || !optionsDiv) return;
    
    input.addEventListener('focus', () => optionsDiv.classList.add('show'));
    input.addEventListener('blur', () => setTimeout(() => optionsDiv.classList.remove('show'), 200));
    input.addEventListener('input', function() {
        const termo = this.value.toLowerCase();
        const options = optionsDiv.querySelectorAll('.select-option');
        options.forEach(opt => {
            const text = opt.textContent.toLowerCase();
            opt.style.display = text.includes(termo) ? 'block' : 'none';
        });
        optionsDiv.classList.add('show');
    });
    
    optionsDiv.querySelectorAll('.select-option').forEach(opt => {
        opt.addEventListener('click', function() {
            input.value = this.getAttribute('data-value');
            optionsDiv.classList.remove('show');
            if (callback) callback(this.getAttribute('data-value'));
        });
    });
}

function renderizarFormalizados() {
    const container = document.getElementById('formalizados-content');
    if (!container) return;
    
    const anos = [...new Set(conveniosData.map(c => c.ano))].filter(Boolean).sort().reverse();
    const proponentes = [...new Set(conveniosData.map(c => c.proponente))].filter(Boolean).sort();
    
    let dadosFiltrados = conveniosData.filter(c => {
        if (filtrosFormalizados.ano && c.ano != filtrosFormalizados.ano) return false;
        if (filtrosFormalizados.proponente && c.proponente !== filtrosFormalizados.proponente) return false;
        return true;
    });
    
    const totalConvenios = dadosFiltrados.length;
    const totalProponente = dadosFiltrados.reduce((acc, c) => acc + (parseFloat(c.valor_proponente) || 0), 0);
    const totalConcedente = dadosFiltrados.reduce((acc, c) => acc + (parseFloat(c.valor_concedente) || 0), 0);
    const totalGeral = dadosFiltrados.reduce((acc, c) => acc + (parseFloat(c.valor_total_convenio) || 0), 0);
    
    const proponentesMap = new Map();
    dadosFiltrados.forEach(c => {
        const nome = c.proponente;
        if (!nome) return;
        if (!proponentesMap.has(nome)) {
            proponentesMap.set(nome, { proponente: nome, convenios: 0, valorProponente: 0, valorConcedente: 0, valorTotal: 0 });
        }
        const p = proponentesMap.get(nome);
        p.convenios++;
        p.valorProponente += parseFloat(c.valor_proponente) || 0;
        p.valorConcedente += parseFloat(c.valor_concedente) || 0;
        p.valorTotal += parseFloat(c.valor_total_convenio) || 0;
    });
    
    let dadosTabela = Array.from(proponentesMap.values());
    dadosTabela = ordenarDados(dadosTabela, ordenacaoFormalizados.coluna, ordenacaoFormalizados.direcao, 'texto');
    
    const totalRegistros = dadosTabela.length;
    const inicio = (paginaAtual.formalizados - 1) * itensPorPagina;
    const dadosPagina = dadosTabela.slice(inicio, inicio + itensPorPagina);
    
    let html = `
        <div class="filter-container">
            <div class="row g-2">
                <div class="col-md-5"><label class="filter-label">Ano</label>${criarSelectComBusca('anoFormalizados', anos, filtrosFormalizados.ano, 'Digite ou selecione o ano...')}</div>
                <div class="col-md-5"><label class="filter-label">Proponente</label>${criarSelectComBusca('proponenteFormalizados', proponentes, filtrosFormalizados.proponente, 'Digite ou selecione o proponente...')}</div>
                <div class="col-md-2 d-flex align-items-end"><button class="btn-pesquisa me-2" onclick="aplicarFiltrosFormalizados()">Pesquisar</button><button class="btn-secondary-custom" onclick="limparFiltrosFormalizados()">Limpar</button></div>
            </div>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Total de Convênios</div><div class="metric-body"><div class="metric-value">${totalConvenios.toLocaleString()}</div></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Valor Proponente</div><div class="metric-body"><div class="metric-value">${formatarMoeda(totalProponente)}</div></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Valor Concedente</div><div class="metric-body"><div class="metric-value">${formatarMoeda(totalConcedente)}</div></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Valor Total</div><div class="metric-body"><div class="metric-value">${formatarMoeda(totalGeral)}</div></div></div></div>
        </div>
        <div class="table-container"><table class="table"><thead><tr><th class="${ordenacaoFormalizados.coluna === 'proponente' ? ordenacaoFormalizados.direcao : ''}" onclick="ordenar('formalizados', 'proponente')">Proponente</th><th class="text-end ${ordenacaoFormalizados.coluna === 'convenios' ? ordenacaoFormalizados.direcao : ''}" onclick="ordenar('formalizados', 'convenios')">Qtd Convênios</th><th class="text-end ${ordenacaoFormalizados.coluna === 'valorProponente' ? ordenacaoFormalizados.direcao : ''}" onclick="ordenar('formalizados', 'valorProponente')">Valor Proponente</th><th class="text-end ${ordenacaoFormalizados.coluna === 'valorConcedente' ? ordenacaoFormalizados.direcao : ''}" onclick="ordenar('formalizados', 'valorConcedente')">Valor Concedente</th><th class="text-end ${ordenacaoFormalizados.coluna === 'valorTotal' ? ordenacaoFormalizados.direcao : ''}" onclick="ordenar('formalizados', 'valorTotal')">Valor Total</th></tr></thead>
        <tbody>${dadosPagina.map(item => `<tr><td><a href="#" class="orgao-link" onclick="irParaConsultaIndividual('${item.proponente.replace(/'/g, "\\'")}')">${item.proponente}</a></td><td class="text-end">${item.convenios}</td><td class="text-end">${formatarMoeda(item.valorProponente)}</td><td class="text-end">${formatarMoeda(item.valorConcedente)}</td><td class="text-end">${formatarMoeda(item.valorTotal)}</tr>`).join('')}</tbody></table>${renderizarPaginacao('formalizados', totalRegistros)}</div>`;
    container.innerHTML = html;
    
    initSelectComBusca('anoFormalizados', (val) => { filtrosFormalizados.ano = val; renderizarFormalizados(); });
    initSelectComBusca('proponenteFormalizados', (val) => { filtrosFormalizados.proponente = val; renderizarFormalizados(); });
}

function ordenar(tipo, coluna) {
    let ordenacao;
    if (tipo === 'formalizados') ordenacao = ordenacaoFormalizados;
    else if (tipo === 'individual') ordenacao = ordenacaoIndividual;
    else if (tipo === 'execucao') ordenacao = ordenacaoExecucao;
    else ordenacao = ordenacaoArrecadacao;
    
    if (ordenacao.coluna === coluna) ordenacao.direcao = ordenacao.direcao === 'asc' ? 'desc' : 'asc';
    else { ordenacao.coluna = coluna; ordenacao.direcao = 'asc'; }
    
    if (tipo === 'formalizados') renderizarFormalizados();
    else if (tipo === 'individual') renderizarIndividual();
    else if (tipo === 'execucao') renderizarExecucao();
    else renderizarArrecadacao();
}

function aplicarFiltrosFormalizados() {
    const anoInput = document.getElementById('anoFormalizados_input');
    const proponenteInput = document.getElementById('proponenteFormalizados_input');
    filtrosFormalizados.ano = anoInput ? anoInput.value : '';
    filtrosFormalizados.proponente = proponenteInput ? proponenteInput.value : '';
    paginaAtual.formalizados = 1;
    renderizarFormalizados();
}

function limparFiltrosFormalizados() {
    filtrosFormalizados = { ano: '', proponente: '' };
    paginaAtual.formalizados = 1;
    renderizarFormalizados();
}

function irParaConsultaIndividual(proponente) {
    document.getElementById('individual-tab').click();
    setTimeout(() => {
        const input = document.getElementById('filtroProponenteIndividual_input');
        if (input) { input.value = proponente; filtrosIndividual.proponente = proponente; renderizarIndividual(); }
    }, 300);
}

function renderizarIndividual() {
    const container = document.getElementById('individual-content');
    if (!container) return;
    
    const anos = [...new Set(conveniosData.map(c => c.ano))].filter(Boolean).sort().reverse();
    const instrumentos = [...new Set(conveniosData.map(c => c.instrumento))].filter(Boolean).sort();
    const proponentes = [...new Set(conveniosData.map(c => c.proponente))].filter(Boolean).sort();
    const concedentes = [...new Set(conveniosData.map(c => c.concedente))].filter(Boolean).sort();
    const situacoes = [...new Set(conveniosData.map(c => c.situacao))].filter(Boolean).sort();
    
    let dadosFiltrados = conveniosData.filter(c => {
        if (filtrosIndividual.ano && c.ano != filtrosIndividual.ano) return false;
        if (filtrosIndividual.codigoSiafi && !c.codigo_siafi?.toLowerCase().includes(filtrosIndividual.codigoSiafi.toLowerCase())) return false;
        if (filtrosIndividual.codigoSigcon && !c.codigo_sigcon?.toLowerCase().includes(filtrosIndividual.codigoSigcon.toLowerCase())) return false;
        if (filtrosIndividual.instrumento && c.instrumento !== filtrosIndividual.instrumento) return false;
        if (filtrosIndividual.proponente && !c.proponente?.toLowerCase().includes(filtrosIndividual.proponente.toLowerCase())) return false;
        if (filtrosIndividual.concedente && !c.concedente?.toLowerCase().includes(filtrosIndividual.concedente.toLowerCase())) return false;
        if (filtrosIndividual.situacao && c.situacao !== filtrosIndividual.situacao) return false;
        return true;
    });
    
    if (buscaIndividual) {
        const termo = buscaIndividual.toLowerCase();
        dadosFiltrados = dadosFiltrados.filter(c => c.proponente?.toLowerCase().includes(termo) || c.concedente?.toLowerCase().includes(termo) || c.codigo_siafi?.toLowerCase().includes(termo) || c.objeto?.toLowerCase().includes(termo));
    }
    
    dadosFiltrados = ordenarDados(dadosFiltrados, ordenacaoIndividual.coluna, ordenacaoIndividual.direcao, 'texto');
    
    const totalRegistros = dadosFiltrados.length;
    const inicio = (paginaAtual.individual - 1) * itensPorPagina;
    const dadosPagina = dadosFiltrados.slice(inicio, inicio + itensPorPagina);
    const colunasExibidas = ordemColunasIndividual.filter(col => colunasVisiveisIndividual[col]);
    
    let html = `
        <div class="filter-container">
            <div class="row g-2">
                <div class="col-md-3"><label class="filter-label">Ano</label>${criarSelectComBusca('anoIndividual', anos, filtrosIndividual.ano, 'Digite ou selecione o ano...')}</div>
                <div class="col-md-3"><label class="filter-label">Código SIAFI</label><input type="text" class="form-control" id="filtroSiafiIndividual" placeholder="Digite..." value="${filtrosIndividual.codigoSiafi || ''}"></div>
                <div class="col-md-3"><label class="filter-label">Código SIGCON</label><input type="text" class="form-control" id="filtroSigconIndividual" placeholder="Digite..." value="${filtrosIndividual.codigoSigcon || ''}"></div>
                <div class="col-md-3"><label class="filter-label">Instrumento</label>${criarSelectComBusca('instrumentoIndividual', instrumentos, filtrosIndividual.instrumento, 'Digite ou selecione o instrumento...')}</div>
            </div>
            <div class="row g-2 mt-2">
                <div class="col-md-3"><label class="filter-label">Proponente</label><input type="text" class="form-control" id="filtroProponenteIndividual" placeholder="Digite..." value="${filtrosIndividual.proponente || ''}"></div>
                <div class="col-md-3"><label class="filter-label">Concedente</label><input type="text" class="form-control" id="filtroConcedenteIndividual" placeholder="Digite..." value="${filtrosIndividual.concedente || ''}"></div>
                <div class="col-md-3"><label class="filter-label">Situação</label>${criarSelectComBusca('situacaoIndividual', situacoes, filtrosIndividual.situacao, 'Digite ou selecione a situação...')}</div>
                <div class="col-md-3 d-flex align-items-end"><button class="btn-pesquisa me-2" onclick="aplicarFiltrosIndividual()">Pesquisar</button><button class="btn-secondary-custom" onclick="limparFiltrosIndividual()">Limpar</button></div>
            </div>
        </div>
        <div class="toolbar">
            <div class="d-flex gap-2">
                <button class="btn-export" onclick="exportarIndividualCSV()"><i class="material-icons" style="font-size: 14px;">description</i>CSV</button>
                <button class="btn-export" onclick="exportarIndividualPDF()"><i class="material-icons" style="font-size: 14px;">picture_as_pdf</i>PDF</button>
                <div class="column-selector-icon" onclick="toggleColumnSelector(event, 'individual')"><i class="material-icons" style="font-size: 16px;">view_column</i> Colunas
                    <div class="column-selector-popup" id="columnSelectorPopupIndividual"><div class="column-selector-grid">${ordemColunasIndividual.map(col => `<label class="column-selector-item"><input type="checkbox" ${colunasVisiveisIndividual[col] ? 'checked' : ''} onchange="toggleColunaIndividual('${col}')">${col.replace(/_/g, ' ').toUpperCase()}</label>`).join('')}</div></div>
                </div>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <span class="badge bg-secondary">Total: ${totalRegistros} registros</span>
                <input type="text" class="form-control search-input-small" placeholder="Buscar na tabela..." id="buscaIndividualInput" value="${buscaIndividual}" onkeyup="buscaIndividualChange(this.value)">
            </div>
        </div>
        <div class="table-container"><table class="table" style="min-width: 1200px;"><thead><tr>${colunasExibidas.map(col => `<th class="${ordenacaoIndividual.coluna === col ? ordenacaoIndividual.direcao : ''}" onclick="ordenar('individual', '${col}')">${col.replace(/_/g, ' ').toUpperCase()}</th>`).join('')}<th class="text-end ${ordenacaoIndividual.coluna === 'valor_proponente' ? ordenacaoIndividual.direcao : ''}" onclick="ordenar('individual', 'valor_proponente')">VALOR PROPONENTE</th><th class="text-end ${ordenacaoIndividual.coluna === 'valor_concedente' ? ordenacaoIndividual.direcao : ''}" onclick="ordenar('individual', 'valor_concedente')">VALOR CONCEDENTE</th><th class="text-end ${ordenacaoIndividual.coluna === 'valor_total_convenio' ? ordenacaoIndividual.direcao : ''}" onclick="ordenar('individual', 'valor_total_convenio')">VALOR TOTAL</th><th>AÇÕES</th></tr>
        </thead>
        <tbody>${dadosPagina.map(item => {
            const link = getLinkInteiroTeor(item);
            return `<tr>${colunasExibidas.map(col => {

                if (col.includes('data')) valor = formatarData(valor);
                if (col === 'codigo_siafi' && valor !== '-') {
                    return `<td>${link ? `<a href="${link}" target="_blank" class="siafi-link">${valor}</a>` : valor}</td>`;
                }
                return `<td>${valor}</td>`;
            }).join('')}<td class="text-end">${formatarMoeda(item.valor_proponente)}</td><td class="text-end">${formatarMoeda(item.valor_concedente)}</td><td class="text-end">${formatarMoeda(item.valor_total_convenio)}</td><td class="text-center"><button class="btn-action" onclick='abrirModalDetalhesConvenio(${JSON.stringify(item).replace(/'/g, "\\'")})'><i class="material-icons" style="font-size: 16px;">visibility</i></button></td></tr>`;
        }).join('')}</tbody></table>${renderizarPaginacao('individual', totalRegistros)}</div>`;
    container.innerHTML = html;
    
    initSelectComBusca('anoIndividual', (val) => { filtrosIndividual.ano = val; renderizarIndividual(); });
    initSelectComBusca('instrumentoIndividual', (val) => { filtrosIndividual.instrumento = val; renderizarIndividual(); });
    initSelectComBusca('situacaoIndividual', (val) => { filtrosIndividual.situacao = val; renderizarIndividual(); });
    
    document.getElementById('filtroSiafiIndividual')?.addEventListener('input', (e) => { filtrosIndividual.codigoSiafi = e.target.value; renderizarIndividual(); });
    document.getElementById('filtroSigconIndividual')?.addEventListener('input', (e) => { filtrosIndividual.codigoSigcon = e.target.value; renderizarIndividual(); });
    document.getElementById('filtroProponenteIndividual')?.addEventListener('input', (e) => { filtrosIndividual.proponente = e.target.value; renderizarIndividual(); });
    document.getElementById('filtroConcedenteIndividual')?.addEventListener('input', (e) => { filtrosIndividual.concedente = e.target.value; renderizarIndividual(); });
}

function toggleColunaIndividual(coluna) { colunasVisiveisIndividual[coluna] = !colunasVisiveisIndividual[coluna]; renderizarIndividual(); }
function toggleColunaExecucao(coluna) { colunasVisiveisExecucao[coluna] = !colunasVisiveisExecucao[coluna]; renderizarExecucao(); }
function toggleColunaArrecadacao(coluna) { colunasVisiveisArrecadacao[coluna] = !colunasVisiveisArrecadacao[coluna]; renderizarArrecadacao(); }
function toggleColumnSelector(event, tipo) { 
    event.stopPropagation(); 
    let popupId = '';
    if (tipo === 'individual') popupId = 'columnSelectorPopupIndividual';
    else if (tipo === 'execucao') popupId = 'columnSelectorPopupExecucao';
    else popupId = 'columnSelectorPopupArrecadacao';
    document.getElementById(popupId)?.classList.toggle('show');
}

function aplicarFiltrosIndividual() {
    const anoInput = document.getElementById('anoIndividual_input');
    const instrumentoInput = document.getElementById('instrumentoIndividual_input');
    const situacaoInput = document.getElementById('situacaoIndividual_input');
    filtrosIndividual.ano = anoInput ? anoInput.value : '';
    filtrosIndividual.instrumento = instrumentoInput ? instrumentoInput.value : '';
    filtrosIndividual.situacao = situacaoInput ? situacaoInput.value : '';
    filtrosIndividual.codigoSiafi = document.getElementById('filtroSiafiIndividual')?.value || '';
    filtrosIndividual.codigoSigcon = document.getElementById('filtroSigconIndividual')?.value || '';
    filtrosIndividual.proponente = document.getElementById('filtroProponenteIndividual')?.value || '';
    filtrosIndividual.concedente = document.getElementById('filtroConcedenteIndividual')?.value || '';

}
function limparFiltrosIndividual() { 
    filtrosIndividual = { ano: '', codigoSiafi: '', codigoSigcon: '', instrumento: '', proponente: '', concedente: '', situacao: '' }; 
    buscaIndividual = ''; 
    if(document.getElementById('buscaIndividualInput')) document.getElementById('buscaIndividualInput').value = ''; 
    paginaAtual.individual = 1; 
    renderizarIndividual(); 
}
function buscaIndividualChange(valor) { buscaIndividual = valor; paginaAtual.individual = 1; renderizarIndividual(); }

function renderizarExecucao() {
    const container = document.getElementById('execucao-content');
    if (!container) return;
    
    const conveniosMap = new Map();
    conveniosData.forEach(c => { if (c.codigo_siafi) conveniosMap.set(c.codigo_siafi, c); });
    
    let dadosFiltrados = execucaoData.filter(e => {
        if (filtrosExecucao.ano && e.ano_exercicio_receita != filtrosExecucao.ano) return false;
        if (filtrosExecucao.numeroSiafi && !e.no_siafi?.toLowerCase().includes(filtrosExecucao.numeroSiafi.toLowerCase())) return false;
        if (filtrosExecucao.anoEmpenho && e.ano_empenho != filtrosExecucao.anoEmpenho) return false;
        if (filtrosExecucao.numeroEmpenho && !e.no_empenho?.toLowerCase().includes(filtrosExecucao.numeroEmpenho.toLowerCase())) return false;
        return true;
    });
    
    if (buscaExecucao) {
        const termo = buscaExecucao.toLowerCase();
        dadosFiltrados = dadosFiltrados.filter(e => e.razao_social_credor?.toLowerCase().includes(termo) || e.no_siafi?.toLowerCase().includes(termo));
    }
    
    dadosFiltrados = dadosFiltrados.map(e => ({ ...e, proponente: conveniosMap.get(e.no_siafi)?.proponente || '-', concedente: conveniosMap.get(e.no_siafi)?.concedente || '-', situacao_convenio: conveniosMap.get(e.no_siafi)?.situacao || '-' }));
    dadosFiltrados = ordenarDados(dadosFiltrados, ordenacaoExecucao.coluna, ordenacaoExecucao.direcao, 'texto');
    
    const totalRegistros = dadosFiltrados.length;
    const inicio = (paginaAtual.execucao - 1) * itensPorPagina;
    const dadosPagina = dadosFiltrados.slice(inicio, inicio + itensPorPagina);
    const anos = [...new Set(execucaoData.map(e => e.ano_exercicio_receita))].filter(Boolean).sort().reverse();
    const colunasExibidas = ordemColunasExecucao.filter(col => colunasVisiveisExecucao[col]);
    
    let html = `
        <div class="filter-container">
            <div class="row g-2">
                <div class="col-md-2"><label class="filter-label">Ano</label>${criarSelectComBusca('anoExecucao', anos, filtrosExecucao.ano, 'Digite ou selecione o ano...')}</div>
                <div class="col-md-2"><label class="filter-label">Nº SIAFI</label><input type="text" class="form-control" id="filtroSiafiExecucao" placeholder="Digite..." value="${filtrosExecucao.numeroSiafi || ''}"></div>
                <div class="col-md-2"><label class="filter-label">Ano Empenho</label><input type="text" class="form-control" id="filtroAnoEmpenhoExecucao" placeholder="Digite..." value="${filtrosExecucao.anoEmpenho || ''}"></div>
                <div class="col-md-2"><label class="filter-label">Nº Empenho</label><input type="text" class="form-control" id="filtroNumeroEmpenhoExecucao" placeholder="Digite..." value="${filtrosExecucao.numeroEmpenho || ''}"></div>
                <div class="col-md-4 d-flex align-items-end gap-2"><button class="btn-pesquisa me-2" onclick="aplicarFiltrosExecucao()">Pesquisar</button><button class="btn-secondary-custom" onclick="limparFiltrosExecucao()">Limpar</button></div>
            </div>
        </div>
        <div class="toolbar">
            <div class="d-flex gap-2">
                <button class="btn-export" onclick="exportarExecucaoCSV()"><i class="material-icons" style="font-size: 14px;">description</i>CSV</button>
                <button class="btn-export" onclick="exportarExecucaoPDF()"><i class="material-icons" style="font-size: 14px;">picture_as_pdf</i>PDF</button>
                <div class="column-selector-icon" onclick="toggleColumnSelector(event, 'execucao')"><i class="material-icons" style="font-size: 16px;">view_column</i> Colunas
                    <div class="column-selector-popup" id="columnSelectorPopupExecucao"><div class="column-selector-grid">${ordemColunasExecucao.map(col => `<label class="column-selector-item"><input type="checkbox" ${colunasVisiveisExecucao[col] ? 'checked' : ''} onchange="toggleColunaExecucao('${col}')">${col.replace(/_/g, ' ').toUpperCase()}</label>`).join('')}</div></div>
                </div>
            </div>
            <div class="d-flex gap-3 align-items-center"><span class="badge bg-secondary">Total: ${totalRegistros} registros</span><input type="text" class="form-control search-input-small" placeholder="Buscar na tabela..." id="buscaExecucaoInput" value="${buscaExecucao}" onkeyup="buscaExecucaoChange(this.value)"></div>
        </div>
        <div class="table-container"><table class="table" style="min-width: 1300px;"><thead><tr>${colunasExibidas.map(col => `<th class="${ordenacaoExecucao.coluna === col ? ordenacaoExecucao.direcao : ''}" onclick="ordenar('execucao', '${col}')">${col.replace(/_/g, ' ').toUpperCase()}</th>`).join('')}<th>AÇÕES</th></tr>
        </thead>
        <tbody>${dadosPagina.map(item => {
            const convenio = conveniosMap.get(item.no_siafi);
            const link = convenio ? getLinkInteiroTeor(convenio) : null;
            return `<tr>${colunasExibidas.map(col => {
                let valor = item[col] || '-';
                if (col === 'valor_empenhado' || col === 'valor_liquidado' || col === 'valor_pago') {
                    valor = formatarMoeda(valor);
                }
                if (col === 'no_siafi' && valor !== '-') {
                    return `<td>${link ? `<a href="${link}" target="_blank" class="siafi-link">${valor}</a>` : valor}</td>`;
                }
                return `<td>${valor}</td>`;
            }).join('')}<td class="text-center"><button class="btn-action" onclick='abrirModalExecucao(${JSON.stringify(item).replace(/'/g, "\\'")})'><i class="material-icons" style="font-size: 16px;">visibility</i></button></td></tr>`;
        }).join('')}</tbody></table>${renderizarPaginacao('execucao', totalRegistros)}</div>`;
    container.innerHTML = html;
    
    initSelectComBusca('anoExecucao', (val) => { filtrosExecucao.ano = val; renderizarExecucao(); });
    document.getElementById('filtroSiafiExecucao')?.addEventListener('input', (e) => { filtrosExecucao.numeroSiafi = e.target.value; renderizarExecucao(); });
    document.getElementById('filtroAnoEmpenhoExecucao')?.addEventListener('input', (e) => { filtrosExecucao.anoEmpenho = e.target.value; renderizarExecucao(); });
    document.getElementById('filtroNumeroEmpenhoExecucao')?.addEventListener('input', (e) => { filtrosExecucao.numeroEmpenho = e.target.value; renderizarExecucao(); });
}

function aplicarFiltrosExecucao() {
    const anoInput = document.getElementById('anoExecucao_input');
    filtrosExecucao.ano = anoInput ? anoInput.value : '';
    filtrosExecucao.numeroSiafi = document.getElementById('filtroSiafiExecucao')?.value || '';
    filtrosExecucao.anoEmpenho = document.getElementById('filtroAnoEmpenhoExecucao')?.value || '';
    filtrosExecucao.numeroEmpenho = document.getElementById('filtroNumeroEmpenhoExecucao')?.value || '';
    paginaAtual.execucao = 1;
    renderizarExecucao();
}
function limparFiltrosExecucao() { filtrosExecucao = { ano: '', numeroSiafi: '', anoEmpenho: '', numeroEmpenho: '' }; buscaExecucao = ''; if(document.getElementById('buscaExecucaoInput')) document.getElementById('buscaExecucaoInput').value = ''; paginaAtual.execucao = 1; renderizarExecucao(); }
function buscaExecucaoChange(valor) { buscaExecucao = valor; paginaAtual.execucao = 1; renderizarExecucao(); }

function renderizarArrecadacao() {
    const container = document.getElementById('arrecadacao-content');
    if (!container) return;
    
    const conveniosMap = new Map();
    conveniosData.forEach(c => { if (c.codigo_siafi) conveniosMap.set(c.codigo_siafi, c); });
    
    let dadosFiltrados = arrecadacaoData.filter(a => {
        if (filtrosArrecadacao.ano && a.ano_exercicio_receita != filtrosArrecadacao.ano) return false;
        if (filtrosArrecadacao.numeroSiafi && !a.no_siafi?.toLowerCase().includes(filtrosArrecadacao.numeroSiafi.toLowerCase())) return false;
        if (filtrosArrecadacao.tipoReceita && a.tipo_de_receita !== filtrosArrecadacao.tipoReceita) return false;
        if (filtrosArrecadacao.fonte && a.fonte !== filtrosArrecadacao.fonte) return false;
        return true;
    });
    
    dadosFiltrados = dadosFiltrados.map(a => {
    const convenio = conveniosMap.get(a.no_siafi);
    const { uo, ...resto } = a;  // Remove a coluna uo que não será usada
    return {
        no_siafi: resto.no_siafi,
        unidade_orcamentaria: convenio?.proponente || '-',
        ano_exercicio_receita: resto.ano_exercicio_receita,
        codigo_classificacao_receita: resto.codigo_classificacao_receita,
        tipo_de_receita: resto.tipo_de_receita,
        fonte: resto.fonte,
        data_da_arrecadacao: resto.data_da_arrecadacao,
        receita_arrecadada: resto.receita_arrecadada  // já vem sem o _r
    };
});

console.log('Primeiro registro completo:', dadosFiltrados[0]);
console.log('Todas as chaves:', Object.keys(dadosFiltrados[0] || {}));
    
    if (buscaArrecadacao) {
        const termo = buscaArrecadacao.toLowerCase();
        dadosFiltrados = dadosFiltrados.filter(a => a.no_siafi?.toLowerCase().includes(termo) || a.unidade_orcamentaria?.toLowerCase().includes(termo));
    }
    
    dadosFiltrados = ordenarDados(dadosFiltrados, ordenacaoArrecadacao.coluna, ordenacaoArrecadacao.direcao, 'texto');
    
    const totalRegistros = dadosFiltrados.length;
    const inicio = (paginaAtual.arrecadacao - 1) * itensPorPagina;
    const dadosPagina = dadosFiltrados.slice(inicio, inicio + itensPorPagina);
    const anos = [...new Set(arrecadacaoData.map(a => a.ano_exercicio_receita))].filter(Boolean).sort().reverse();
    const tipos = [...new Set(arrecadacaoData.map(a => a.tipo_de_receita))].filter(Boolean).sort();
    const fontes = [...new Set(arrecadacaoData.map(a => a.fonte))].filter(Boolean).sort();
    const colunasExibidas = ordemColunasArrecadacao.filter(col => colunasVisiveisArrecadacao[col]);
    
    let html = `
        <div class="filter-container">
            <div class="row g-2">
                <div class="col-md-3"><label class="filter-label">Ano</label>${criarSelectComBusca('anoArrecadacao', anos, filtrosArrecadacao.ano, 'Digite ou selecione o ano...')}</div>
                <div class="col-md-3"><label class="filter-label">Nº SIAFI</label><input type="text" class="form-control" id="filtroSiafiArrecadacao" placeholder="Digite..." value="${filtrosArrecadacao.numeroSiafi || ''}"></div>
                <div class="col-md-3"><label class="filter-label">Tipo Receita</label>${criarSelectComBusca('tipoArrecadacao', tipos, filtrosArrecadacao.tipoReceita, 'Digite ou selecione o tipo...')}</div>
                <div class="col-md-3"><label class="filter-label">Fonte</label>${criarSelectComBusca('fonteArrecadacao', fontes, filtrosArrecadacao.fonte, 'Digite ou selecione a fonte...')}</div>
            </div>
            <div class="row mt-2"><div class="col-12 d-flex justify-content-end gap-2"><button class="btn-pesquisa me-2" onclick="aplicarFiltrosArrecadacao()">Pesquisar</button><button class="btn-secondary-custom" onclick="limparFiltrosArrecadacao()">Limpar</button></div></div>
        </div>
        <div class="toolbar">
            <div class="d-flex gap-2">
                <button class="btn-export" onclick="exportarArrecadacaoCSV()"><i class="material-icons" style="font-size: 14px;">description</i>CSV</button>
                <button class="btn-export" onclick="exportarArrecadacaoPDF()"><i class="material-icons" style="font-size: 14px;">picture_as_pdf</i>PDF</button>
                <div class="column-selector-icon" onclick="toggleColumnSelector(event, 'arrecadacao')"><i class="material-icons" style="font-size: 16px;">view_column</i> Colunas
                    <div class="column-selector-popup" id="columnSelectorPopupArrecadacao"><div class="column-selector-grid">${ordemColunasArrecadacao.map(col => `<label class="column-selector-item"><input type="checkbox" ${colunasVisiveisArrecadacao[col] ? 'checked' : ''} onchange="toggleColunaArrecadacao('${col}')">${col.replace(/_/g, ' ').toUpperCase()}</label>`).join('')}</div></div>
                </div>
            </div>
            <div class="d-flex gap-3 align-items-center"><span class="badge bg-secondary">Total: ${totalRegistros} registros</span><input type="text" class="form-control search-input-small" placeholder="Buscar na tabela..." id="buscaArrecadacaoInput" value="${buscaArrecadacao}" onkeyup="buscaArrecadacaoChange(this.value)"></div>
        </div>
        <div class="table-container"><table class="table"><thead><tr>${colunasExibidas.map(col => `<th class="${ordenacaoArrecadacao.coluna === col ? ordenacaoArrecadacao.direcao : ''}" onclick="ordenar('arrecadacao', '${col}')">${col.replace(/_/g, ' ').toUpperCase()}</th>`).join('')}<th>AÇÕES</th></tr>
        </thead>
        <tbody>${dadosPagina.map(item => {
            const convenio = conveniosMap.get(item.no_siafi);
            const link = convenio ? getLinkInteiroTeor(convenio) : null;
            return `<td>${colunasExibidas.map(col => {
                let valor = item[col] || '-';
                if (col === 'data_da_arrecadacao') valor = formatarData(valor);
                if (col === 'receita_arrecadada') valor = formatarMoeda(valor);
                if (col === 'no_siafi' && valor !== '-') {
                    return `<td>${link ? `<a href="${link}" target="_blank" class="siafi-link">${valor}</a>` : valor}</td>`;
                }
                return `<td>${valor}</td>`;
            }).join('')}<td class="text-center"><button class="btn-action" onclick='abrirModalArrecadacao(${JSON.stringify(item).replace(/'/g, "\\'")})'><i class="material-icons" style="font-size: 16px;">visibility</i></button></td></tr>`;
        }).join('')}</tbody></table>${renderizarPaginacao('arrecadacao', totalRegistros)}</div>`;
    container.innerHTML = html;
    
    initSelectComBusca('anoArrecadacao', (val) => { filtrosArrecadacao.ano = val; renderizarArrecadacao(); });
    initSelectComBusca('tipoArrecadacao', (val) => { filtrosArrecadacao.tipoReceita = val; renderizarArrecadacao(); });
    initSelectComBusca('fonteArrecadacao', (val) => { filtrosArrecadacao.fonte = val; renderizarArrecadacao(); });
    document.getElementById('filtroSiafiArrecadacao')?.addEventListener('input', (e) => { filtrosArrecadacao.numeroSiafi = e.target.value; renderizarArrecadacao(); });
}

function aplicarFiltrosArrecadacao() {
    const anoInput = document.getElementById('anoArrecadacao_input');
    const tipoInput = document.getElementById('tipoArrecadacao_input');
    const fonteInput = document.getElementById('fonteArrecadacao_input');
    filtrosArrecadacao.ano = anoInput ? anoInput.value : '';
    filtrosArrecadacao.tipoReceita = tipoInput ? tipoInput.value : '';
    filtrosArrecadacao.fonte = fonteInput ? fonteInput.value : '';
    filtrosArrecadacao.numeroSiafi = document.getElementById('filtroSiafiArrecadacao')?.value || '';
    paginaAtual.arrecadacao = 1;
    renderizarArrecadacao();
}
function limparFiltrosArrecadacao() { filtrosArrecadacao = { ano: '', numeroSiafi: '', tipoReceita: '', fonte: '' }; buscaArrecadacao = ''; if(document.getElementById('buscaArrecadacaoInput')) document.getElementById('buscaArrecadacaoInput').value = ''; paginaAtual.arrecadacao = 1; renderizarArrecadacao(); }
function buscaArrecadacaoChange(valor) { buscaArrecadacao = valor; paginaAtual.arrecadacao = 1; renderizarArrecadacao(); }

function abrirModalDetalhesConvenio(item) {
    const link = getLinkInteiroTeor(item);
    const grupos = {
        '📋 IDENTIFICAÇÃO': ['codigo_siafi', 'codigo_sigcon', 'sei', 'instrumento', 'ano'],
        '🏢 PARTES': ['proponente', 'concedente', 'esfera_concedente'],
        '💰 FINANCEIRO': ['valor_proponente', 'valor_concedente', 'valor_total_convenio', 'tipo_contrapartida'],
        '📅 DATAS': ['data_assinatura', 'data_publicacao', 'inicio_vigencia', 'termino_vigencia'],
        '📄 INFORMAÇÕES': ['objeto', 'situacao']
    };
    let html = '';
    if (link) {
        html += `<div class="alert alert-info mb-3"><i class="material-icons">link</i> <strong>Documento do Convênio:</strong> <a href="${link}" target="_blank" class="btn-link-document"><i class="material-icons">open_in_new</i> Visualizar Instrumento</a></div>`;
    }
    for (const [titulo, campos] of Object.entries(grupos)) {
        let conteudo = '';
        for (const campo of campos) {
            const valor = item[campo];
            if (valor && valor !== '' && valor !== '-') {
                let valorDisplay = campo.includes('valor') ? formatarMoeda(valor) : (campo.includes('data') ? formatarData(valor) : valor);
                conteudo += `<div class="row mb-2"><div class="col-4 fw-bold">${campo.replace(/_/g, ' ').toUpperCase()}:</div><div class="col-8">${valorDisplay}</div></div>`;
            }
        }
        if (conteudo) html += `<div class="mb-3"><h6 class="fw-bold text-primary">${titulo}</h6>${conteudo}</div>`;
    }
    document.getElementById('modalContent').innerHTML = html;
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

function renderizarDownloads() {
    document.getElementById('downloads-content').innerHTML = `<div class="filter-container text-center p-5"><i class="material-icons" style="font-size: 64px;">cloud_download</i><h4 class="fw-bold mt-3">Portal de Dados Abertos</h4><p>Acesse os dados completos de Convênios, Execução e Arrecadação</p><a href="https://dados.mg.gov.br/dataset/convenios" target="_blank" class="btn-pesquisa">Acessar Portal Dados MG</a></div>`;
}

function renderizarPaginacao(tipo, totalRegistros) {
    const totalPaginas = Math.ceil(totalRegistros / itensPorPagina);
    const pagina = paginaAtual[tipo];
    const inicio = (pagina - 1) * itensPorPagina + 1;
    const fim = Math.min(pagina * itensPorPagina, totalRegistros);
    if (totalRegistros === 0) return `<div class="pagination-container"><div>Nenhum registro encontrado</div></div>`;
    let botoes = '';
    for (let i = Math.max(1, pagina-2); i <= Math.min(totalPaginas, pagina+2); i++) botoes += `<li class="page-item ${i === pagina ? 'active' : ''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}', ${i}); return false;">${i}</a></li>`;
    return `<div class="pagination-container"><div>Mostrando ${inicio}-${fim} de ${totalRegistros}</div><nav><ul class="pagination mb-0"><li class="page-item ${pagina === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}', ${pagina-1}); return false;">«</a></li>${botoes}<li class="page-item ${pagina === totalPaginas ? 'disabled' : ''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}', ${pagina+1}); return false;">»</a></li></ul></nav><select class="items-per-page" onchange="alterarItensPorPagina('${tipo}', this.value)"><option value="25" ${itensPorPagina==25?'selected':''}>25</option><option value="50" ${itensPorPagina==50?'selected':''}>50</option><option value="100" ${itensPorPagina==100?'selected':''}>100</option></select></div>`;
}

function mudarPagina(tipo, pagina) { if (pagina < 1) return; paginaAtual[tipo] = pagina; if (tipo === 'formalizados') renderizarFormalizados(); else if (tipo === 'individual') renderizarIndividual(); else if (tipo === 'execucao') renderizarExecucao(); else if (tipo === 'arrecadacao') renderizarArrecadacao(); }
function alterarItensPorPagina(tipo, valor) { itensPorPagina = parseInt(valor); paginaAtual[tipo] = 1; mudarPagina(tipo, 1); }

function exportarArrecadacaoCSV() { const csv = Papa.unparse(arrecadacaoData, { delimiter: ';' }); const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'arrecadacao.csv'; link.click(); }
