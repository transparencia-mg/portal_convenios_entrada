<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dashboard de Convênios - Transparência MG</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* ============================================================
           1. VARIÁVEIS DE CORES
        ============================================================ */
        :root {
            --primary-dark:      #1a3a5c;
            --primary-darker:    #0f2a44;
            --accent-red:        #b93c42;
            --accent-bright:     #db233f;
            --background-light:  #f5f7fa;
            --success-green:     #28a745;
            --warning-yellow:    #ffc107;
            --info-blue:         #17a2b8;
        }

        /* ============================================================
           2. RESET E CONFIGURAÇÕES GLOBAIS
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; height: auto; min-height: auto; overflow: visible !important; }
        body {
            font-family: 'Montserrat', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow-x: hidden;
        }
        body, button, input, select, textarea, span, div { font-family: 'Montserrat', sans-serif !important; }
        .material-icons { font-family: 'Material Icons' !important; font-size: 14px; vertical-align: middle; }

        /* ============================================================
           3. LAYOUT PRINCIPAL
        ============================================================ */
        .main-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .dashboard-container { width: 100%; max-width: 95% !important; padding: 0 20px; margin: 0 auto; height: auto; min-height: auto; }
        .tab-content, .tab-pane { width: 100%; height: auto; min-height: auto; overflow: visible; }
        .table-container {
            height: auto; min-height: auto; overflow-x: auto; position: relative;
            border-radius: 10px; background: white; box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }

        /* ============================================================
           4. DATA DE ATUALIZAÇÃO
        ============================================================ */
        .data-atualizacao-container { display: flex; justify-content: left; align-items: center; margin: 10px 0 15px; }
        .data-atualizacao-box {
            background: transparent !important;
            border-radius: 8px; padding: 8px 15px;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--primary-dark); font-weight: 600;
            box-shadow: none;
        }
        .data-atualizacao-box i { font-size: 14px; color: var(--accent-red); }

        /* ============================================================
           5. FILTROS
        ============================================================ */
        .filter-container {
            background: white; border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            padding: 20px; margin-bottom: 20px; border-left: none; width: 100%;
        }
        .filter-label { font-size: 13px; font-weight: 600; color: #1a3a5c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
        .filter-label i { font-size: 14px; color: var(--accent-red); }
        .form-control, .form-select {
            border: 2px solid #e9ecef; border-radius: 6px;
            padding: 6px 10px; font-size: 13px; transition: all 0.3s ease; width: 100%;
        }
        .form-control:focus, .form-select:focus { border-color: var(--accent-red); box-shadow: 0 0 0 2px rgba(185,60,66,0.15); }

        /* ============================================================
           6. BOTÕES
        ============================================================ */
        .btn-pesquisa {
            background: #20445d; border: none; padding: 0 16px;
            font-weight: 600; border-radius: 6px; font-size: 13px; color: white;
            display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
            height: 36px; white-space: nowrap; transition: all 0.3s ease;
        }
        .btn-pesquisa:hover { background: var(--accent-red); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(185,60,66,0.2); color: white; }
        .btn-limpar {
            background: white; border: 2px solid var(--primary-darker);
            color: var(--primary-darker); padding: 0 16px; font-weight: 600; font-size: 13px;
            border-radius: 6px; display: inline-flex; align-items: center; gap: 4px;
            cursor: pointer; height: 36px; white-space: nowrap; transition: all 0.3s ease;
        }
        .btn-limpar:hover { background-color: #132837; color: white; border-color: #132837; }
        .btn-export {
            appearance: none; -webkit-appearance: none;
            background: transparent !important; border: 1px solid #d6dee6;
            color: #1a3a5c; padding: 0 14px; border-radius: 6px; font-size: 13px;
            font-weight: 500; display: inline-flex; align-items: center; gap: 4px;
            height: 32px; cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        .btn-export:hover { background-color: #1a3a5c !important; border-color: #1a3a5c !important; color: #ffffff !important; }
        .btn-action {
            padding: 4px; border-radius: 7px; border: 1.5px solid #1a3a5c;
            background-color: #ffffff; color: #1a3a5c; width: 32px; height: 30px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; cursor: pointer;
        }
        .btn-action:hover { background-color: #1a3a5c; color: #ffffff; }
        .btn-link-document {
            background: #28a745; color: white; border: none; padding: 4px 10px;
            border-radius: 4px; font-size: 11px; text-decoration: none;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .btn-link-document:hover { background: #218838; color: white; }
        .btn-topo {
            background: #eeeff5; color: #1a3a5c; border: 1px solid #d6dee6;
            border-radius: 12px; padding: 0 16px; font-size: 13px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.3s ease; height: 32px;
        }
        .btn-topo:hover { background-color: #1a3a5c; color: #ffffff; border-color: #1a3a5c; }

        /* ============================================================
           7. CARDS MÉTRICAS
        ============================================================ */
        .metric-card {
            background: white; border-radius: 8px; border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06); overflow: hidden; height: 100%;
            transition: box-shadow 0.25s ease, transform 0.25s ease; margin-bottom: 20px;
        }
        .metric-card:hover { box-shadow: 0 8px 24px rgba(26,58,92,0.13); transform: translateY(-2px); }
        .metric-header {
            background: #20445d; color: white; font-size: 13px; font-weight: 600;
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .metric-body { padding: 12px 15px; }
        .metric-value { font-size: 20px; font-weight: 700; color: #171c21; }
        .metric-sublabel { font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

        /* ============================================================
           8. GRÁFICOS
        ============================================================ */
        .chart-card {
            background: white; border-radius: 10px; border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 20px;
        }
        .chart-card-header { background: #20445d; color: white; padding: 12px 16px; }
        .chart-card-header h6 { font-weight: 600; color: white; margin: 0; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .chart-wrapper { position: relative; height: 280px; padding: 15px; }

        /* ============================================================
           9. NAVEGAÇÃO (abas)
        ============================================================ */
        .nav-tabs-container { background: transparent; padding: 10px 0; margin-top: 15px; margin-bottom: 5px; width: 100%; }
        .nav-tabs { border: none !important; gap: 10px; width: 100%; flex-wrap: wrap; }
        .nav-tabs .nav-link {
            border: none !important; background: #ffffff !important; border-radius: 10px !important;
            padding: 8px 18px !important; font-weight: 500; font-size: 14px; color: #1a3a5c !important;
            display: inline-flex !important; align-items: center; gap: 6px; transition: all .25s ease;
        }
        .nav-tabs .nav-link:hover { background: #e6e9ed !important; }
        .nav-tabs .nav-link.active { background: #234c63 !important; color: #fff !important; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .nav-tabs .material-icons { font-size: 14px !important; }

        /* ============================================================
           10. TABELAS
        ============================================================ */
        .table-fixed-header-container { position: relative; overflow: auto; width: 100%; max-height: 600px; }
        .table-fixed-header-container table thead th {
            background-color: #54697b !important; color: white !important;
            position: sticky; top: 0; z-index: 10;
        }
        .table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .table th {
            background-color: #54697b; color: white; padding: 10px 8px; font-weight: 600;
            white-space: nowrap; border: 1px solid #d6dee6; cursor: pointer; user-select: none;
            text-align: left; font-size: 12px; text-transform: uppercase;
        }
        .table th:hover { background-color: #3d5566 !important; }
        .table th.asc:after { content: ' ↑'; font-size: 11px; }
        .table th.desc:after { content: ' ↓'; font-size: 11px; }
        .table td { padding: 8px; border: 1px solid #d6dee6; vertical-align: middle; font-size: 12px; }
        .table td.text-center { text-align: center; }
        .table td.text-end { text-align: right; }
        .table tbody tr { background-color: #ffffff; }
        .table tbody tr:hover { background-color: rgba(41,67,90,0.04); }
        .table tfoot { position: sticky; bottom: 0; z-index: 20; }
        .table tfoot tr, .table tfoot td { background-color: #dfe3e8 !important; font-weight: 700; font-size: 12px; }
        .table-footer-total { background-color: #e9ecef; font-weight: 700; border-top: 2px solid #1a3a5c; }
        .table-footer-total td { background-color: #dfe3e8 !important; font-weight: 700; }
        .metadata-table th { background-color: #20445d; color: white; font-size: 12px; }
        .metadata-table td { font-size: 12px; }
        .table-badge { background: #1a3a5c; color: white; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }

        /* ============================================================
           11. PAGINAÇÃO
        ============================================================ */
        .pagination-container {
            display: flex; justify-content: center; align-items: center;
            padding: 12px 20px; background: white; border-top: 1px solid #dee2e6;
            border-radius: 0 0 10px 10px; flex-wrap: wrap; gap: 12px;
        }
        .pagination-info { font-size: 12px; color: #6c757d; }
        .pagination .page-link { color: var(--primary-dark); border-color: #dee2e6; font-size: 13px; padding: 4px 10px; }
        .pagination .page-link:hover { color: var(--accent-red); background-color: #f8f9fa; }
        .pagination .page-item.active .page-link { background-color: var(--primary-dark); border-color: var(--primary-dark); color: white; }
        .items-per-page {
            height: 34px; min-width: 100px; border-radius: 8px; border: 1px solid #d6dee6;
            padding: 4px 28px 4px 10px; font-size: 13px; font-weight: 600; color: #1a3a5c;
            background-color: #ffffff; appearance: none; -webkit-appearance: none; cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%231a3a5c' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat; background-position: right 6px center;
        }

        /* ============================================================
           12. TOOLBAR
        ============================================================ */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .table-search-container {
            display: flex; align-items: center; white-space: nowrap;
            background: #ffffff; border: 1px solid #d6dee6; border-radius: 8px;
            padding: 5px 10px; height: 34px;
        }
        .table-search-container:hover { border-color: #1a3a5c; }
        .table-search-input { border: none !important; outline: none; background: transparent; font-size: 12px; width: 180px; color: #1a3a5c; }
        .table-search-input::placeholder { color: #94a3b8; }

        /* ============================================================
           13. COLUMN SELECTOR — corrigido para popup fora do fluxo do botão
        ============================================================ */
        .col-sel-wrap { position: relative; display: inline-block; }
        .col-sel-btn {
            appearance: none; -webkit-appearance: none;
            background: transparent !important; border: 1px solid #d6dee6; color: #1a3a5c;
            padding: 0 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
            display: inline-flex; align-items: center; gap: 4px; height: 32px; cursor: pointer;
            transition: all 0.2s ease; white-space: nowrap;
        }
        .col-sel-btn:hover { background-color: #1a3a5c !important; border-color: #1a3a5c !important; color: #ffffff !important; }
        .col-sel-popup {
            display: none; position: absolute; right: 0; top: calc(100% + 4px);
            background: white; border: 1px solid #dce4ee; border-radius: 10px;
            box-shadow: 0 6px 22px rgba(0,0,0,0.14); width: 260px; z-index: 3000;
            padding: 12px; max-height: 300px; overflow-y: auto;
        }
        .col-sel-popup.show { display: block; }
        .col-sel-popup .col-sel-title {
            font-size: 11px; font-weight: 700; color: #20445d;
            padding: 4px 8px 8px; border-bottom: 1px solid #eee; margin-bottom: 4px;
        }
        .col-sel-popup label {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 8px; cursor: pointer; font-size: 12px; border-radius: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .col-sel-popup label:hover { background: #f0f6fb; }
        .col-sel-popup label input[type=checkbox] { flex-shrink: 0; }

        /* ============================================================
           14. SELECT COM BUSCA / AUTOCOMPLETE
        ============================================================ */
        .select-with-search { position: relative; }
        .select-with-search input { width: 100%; padding: 6px 10px; border: 2px solid #e9ecef; border-radius: 6px; font-size: 13px; }
        .select-options {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            max-height: 200px; overflow-y: auto; background: white;
            border: 1px solid #dee2e6; border-radius: 6px; z-index: 1050;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .select-options.show { display: block; }
        .select-option { padding: 6px 10px; cursor: pointer; font-size: 13px; }
        .select-option:hover { background: #f0f6fb; }
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            max-height: 220px; overflow-y: auto; background: white;
            border: 1px solid #dee2e6; border-radius: 6px; z-index: 1050;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .autocomplete-list.show { display: block; }
        .autocomplete-item { padding: 7px 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        .autocomplete-item:hover { background: #e8f0fe; }
        .autocomplete-item mark { background: #fff3cd; padding: 0; font-weight: 700; }

        /* ============================================================
           15. MODAL
        ============================================================ */
        .modal-full-custom { max-width: 82% !important; width: 82% !important; }
        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white !important; padding: 15px 20px; border-bottom: none;
        }
        .modal-creative .modal-header .modal-title { color: white !important; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .modal-creative .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 1; }
        .modal-body .info-section { background: #f8fafd; border-radius: 10px; padding: 13px 16px; margin-bottom: 13px; border: 1px solid #e2e8f0; }
        .modal-body .info-section h6 { font-weight: 700; color: #1a3a5c; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; }
        .modal-body .info-row { display: flex; padding: 5px 0; border-bottom: 1px solid #f0f4f8; }
        .modal-body .info-row:last-child { border-bottom: none; }
        .modal-body .info-label { width: 40%; font-weight: 600; color: #64748b; font-size: 11px; }
        .modal-body .info-value { width: 60%; color: #1e293b; font-size: 11px; font-weight: 500; word-break: break-word; }

        /* ============================================================
           16. LOADING
        ============================================================ */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(238,241,246,0.95); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; gap: 14px;
        }
        .loading-text { font-size: 13px; color: #20445d; font-weight: 700; }

        /* ============================================================
           17. TOAST
        ============================================================ */
        .toast-sucesso {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #e6f4ea; color: #1e4620; border-radius: 12px; padding: 14px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: none; align-items: center;
            justify-content: center; gap: 10px; z-index: 9999; min-width: 280px;
        }
        .toast-content { display: flex; align-items: center; justify-content: center; width: 100%; text-align: center; gap: 10px; }
        .toast-content i { color: #28a745; font-size: 14px; }
        .toast-close { cursor: pointer; font-size: 14px; margin-left: 10px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================
           18. LINKS
        ============================================================ */
        .orgao-link, .siafi-link { color: #006a82; text-decoration: none; font-weight: 500; cursor: pointer; }
        .orgao-link:hover, .siafi-link:hover { color: var(--accent-red); text-decoration: underline; }

        /* ============================================================
           19. RESPONSIVIDADE
        ============================================================ */
        @media (max-width: 992px) { .dashboard-container { padding: 0 15px !important; } .modal-full-custom { max-width: 95% !important; width: 95% !important; } }
        @media (max-width: 768px) {
            .dashboard-container { padding: 0 10px !important; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-right { justify-content: space-between; }
            .table-search-input { width: 100% !important; }
            .modal-body .info-label { width: 45%; }
            .modal-body .info-value { width: 55%; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <!-- Navegação por abas -->
    <div class="nav-tabs-container">
        <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="formalizados-tab" data-bs-toggle="tab" data-bs-target="#formalizados"><i class="material-icons">assignment</i>Visão Geral</button></li>
            <li class="nav-item"><button class="nav-link" id="individual-tab" data-bs-toggle="tab" data-bs-target="#individual"><i class="material-icons">search</i>Consulta Individual</button></li>
            <li class="nav-item"><button class="nav-link" id="execucao-tab" data-bs-toggle="tab" data-bs-target="#execucao"><i class="material-icons">timeline</i>Execução</button></li>
            <li class="nav-item"><button class="nav-link" id="arrecadacao-tab" data-bs-toggle="tab" data-bs-target="#arrecadacao"><i class="material-icons">attach_money</i>Arrecadação</button></li>
            <li class="nav-item"><button class="nav-link" id="downloads-tab" data-bs-toggle="tab" data-bs-target="#downloads"><i class="material-icons">download</i>Downloads</button></li>
        </ul>
    </div>

    <!-- Data de atualização -->
    <div class="data-atualizacao-container">
        <div class="data-atualizacao-box">
            <i class="material-icons">event</i>
            Data de atualização: <span id="data-atualizacao-header" style="margin-left:4px;">carregando...</span>
        </div>
    </div>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="formalizados"><div id="formalizados-content"></div></div>
        <div class="tab-pane fade" id="individual"><div id="individual-content"></div></div>
        <div class="tab-pane fade" id="execucao"><div id="execucao-content"></div></div>
        <div class="tab-pane fade" id="arrecadacao"><div id="arrecadacao-content"></div></div>
        <div class="tab-pane fade" id="downloads"><div id="downloads-content"></div></div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-full-custom modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content modal-creative">
            <div class="modal-header">
                <h5 class="modal-title"><i class="material-icons">info</i>Detalhes do Convênio</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalContent"></div>
            <div class="modal-footer" style="gap:8px;">
                <button type="button" class="btn-export" id="btnModalPDF" onclick="exportarModalPDF()">
                    <i class="material-icons">print</i> PDF
                </button>
                <button type="button" class="btn-export" onclick="copiarLink()">
                    <i class="material-icons">link</i> Copiar Link
                </button>
                <button type="button" class="btn-limpar" data-bs-dismiss="modal"><i class="material-icons">close</i> Fechar</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toastSucesso" class="toast-sucesso">
    <div class="toast-content">
        <i class="material-icons">check_circle</i>
        <span>Link copiado para a área de transferência!</span>

function formatarMoeda(valor) {
    if (!valor && valor !== 0) return 'R$ 0,00';
    let num = typeof valor === 'string' ? parseFloat(valor.replace(/\./g,'').replace(',','.')) : valor;
    if (isNaN(num)) num = 0;
    return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function formatarCpfCnpj(valor) {
    if (!valor || valor === '-') return valor || '-';
    const d = String(valor).replace(/\D/g,'');
    if (d.length === 11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    if (d.length === 14) return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
    return valor;
}

function formatarData(dataStr) {
    if (!dataStr || dataStr === '') return '-';

    if (d.includes('/')) return d;

// ==================== PARSE CSV ====================
function parseCSV(texto) {
    const linhas = texto.trim().split('\n');
    let cabecalhos = linhas[0].split(';').map(h => h.trim().replace(/^\uFEFF/, '').replace(/^["']|["']$/g,'').toLowerCase().replace(/ /g,'_').replace(/\(|\)/g,'').replace(/_r$/,''));
    if (cabecalhos[0] && cabecalhos[0].charCodeAt(0) === 65279) cabecalhos[0] = cabecalhos[0].substring(1);
    if (cabecalhos[0] === '' || cabecalhos[0] === 'ï»¿') cabecalhos[0] = 'uo';
    cabecalhos = cabecalhos.map(h => {
        if (h === 'tipo_de_contrapartida' || h === 'tipo_contrapartida_proponente' || h === 'tipo_contrapartida_do_proponente') return 'tipo_contrapartida';
        if (h === 'numero_siafi' || h === 'num_siafi') return 'no_siafi';
        if (h === 'numero_empenho' || h === 'num_empenho') return 'no_empenho';
        if (h === 'ano_do_empenho' || h === 'ano_exercicio_empenho') return 'ano_empenho';
        return h;
    });
    const dados = [];
    for (let i = 1; i < linhas.length; i++) {
        if (!linhas[i].trim()) continue;
        const valores = []; let campo = ''; let aspas = false;
        for (let c of linhas[i]) {
            if (c === '"') aspas = !aspas;
            else if (c === ';' && !aspas) { valores.push(campo); campo = ''; }
            else campo += c;
        }
        valores.push(campo);
        const linha = {};
        cabecalhos.forEach((cab, idx) => {
            let v = valores[idx] || '';
            v = v.replace(/^["']|["']$/g,'').trim();
            if (cab.includes('valor') && v) v = parseFloat(v.replace(/\./g,'').replace(',','.')) || 0;
            linha[cab] = v;
        });
        dados.push(linha);
    }
    return dados;
}

// ==================== ORDENAÇÃO ====================
function ordenarDados(dados, coluna, direcao) {
    return [...dados].sort((a, b) => {
        let va = a[coluna] ?? '', vb = b[coluna] ?? '';
        const na = parseFloat(va), nb = parseFloat(vb);
        if (!isNaN(na) && !isNaN(nb)) return direcao === 'asc' ? na - nb : nb - na;
        va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
        if (direcao === 'asc') return va > vb ? 1 : va < vb ? -1 : 0;
        return va < vb ? 1 : va > vb ? -1 : 0;
    });
}

// ==================== PAGINAÇÃO ====================
function renderizarPaginacao(tipo, total) {
    const ipp = itensPorPagina[tipo];
    const totalPags = Math.ceil(total / ipp);
    const pagina = paginaAtual[tipo];
    const inicio = (pagina-1)*ipp+1, fim = Math.min(pagina*ipp, total);
    if (total === 0) return `<div class="pagination-container"><div class="pagination-info">Nenhum registro encontrado</div></div>`;
    let botoes = '';
    for (let i = Math.max(1, pagina-2); i <= Math.min(totalPags, pagina+2); i++)
        botoes += `<li class="page-item ${i===pagina?'active':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${i});return false;">${i}</a></li>`;
    return `<div class="pagination-container">
        <div class="pagination-info">Mostrando ${inicio}–${fim} de ${total.toLocaleString('pt-BR')}</div>
        <nav><ul class="pagination mb-0">
            <li class="page-item ${pagina===1?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${pagina-1});return false;">«</a></li>
            ${botoes}
            <li class="page-item ${pagina===totalPags?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${pagina+1});return false;">»</a></li>
        </ul></nav>
        <select class="items-per-page" onchange="alterarItensPorPagina('${tipo}',this.value)">
            ${[25,50,100,200].map(n=>`<option value="${n}" ${ipp===n?'selected':''}>${n} / pág</option>`).join('')}
        </select>
    </div>`;
}

function mudarPagina(tipo, pagina) {
    if (pagina < 1) return;
    paginaAtual[tipo] = pagina;
    if (tipo==='formalizados') renderizarTabelaFormalizados();
    else if (tipo==='individual') renderizarTabelaIndividual();
    else if (tipo==='execucao') renderizarTabelaExecucao();
    else if (tipo==='arrecadacao') renderizarTabelaArrecadacao();
}

function alterarItensPorPagina(tipo, valor) {
    itensPorPagina[tipo] = parseInt(valor);
    paginaAtual[tipo] = 1;
    mudarPagina(tipo, 1);
}

function ordenar(tipo, coluna) {
    let ord = tipo==='formalizados'?ordenacaoFormalizados:tipo==='individual'?ordenacaoIndividual:tipo==='execucao'?ordenacaoExecucao:ordenacaoArrecadacao;
    if (ord.coluna === coluna) ord.direcao = ord.direcao==='asc'?'desc':'asc';
    else { ord.coluna = coluna; ord.direcao = 'asc'; }
    if (tipo==='formalizados') renderizarTabelaFormalizados();
    else if (tipo==='individual') renderizarTabelaIndividual();
    else if (tipo==='execucao') renderizarTabelaExecucao();
    else renderizarTabelaArrecadacao();
}

// ==================== SELECT COM BUSCA ====================
function criarSelectComBusca(id, opcoes, valorAtual, placeholder) {
    const unicas = [...new Set(opcoes.filter(o => o && o !== ''))].sort();
    let opts = `<div class="select-option" data-value="">Todos</div>`;
    opts += unicas.map(o => `<div class="select-option" data-value="${String(o).replace(/"/g,'&quot;')}">${o}</div>`).join('');
    return `<div class="select-with-search" id="${id}_wrapper">
        <input type="text" id="${id}_input" class="form-control" placeholder="${placeholder}" value="${valorAtual||''}" autocomplete="off">
        <div id="${id}_options" class="select-options">${opts}</div>
    </div>`;
}

function initSelectComBusca(id, callback) {
    const input = document.getElementById(`${id}_input`);
    const optDiv = document.getElementById(`${id}_options`);
    if (!input || !optDiv) return;
    input.addEventListener('focus', () => { filtrarOpcoes(optDiv, ''); optDiv.classList.add('show'); });
    input.addEventListener('input', function() { filtrarOpcoes(optDiv, this.value); optDiv.classList.add('show'); });
    input.addEventListener('blur', () => setTimeout(() => optDiv.classList.remove('show'), 200));
    optDiv.querySelectorAll('.select-option').forEach(opt => {
        opt.addEventListener('mousedown', function(e) {
            e.preventDefault();
            const val = this.getAttribute('data-value');
            input.value = val === '' ? '' : this.textContent;
            optDiv.classList.remove('show');
            if (callback) callback(val);
        });
    });
}

function filtrarOpcoes(optDiv, termo) {
    const t = termo.toLowerCase();
    optDiv.querySelectorAll('.select-option').forEach(o => {
        o.style.display = o.textContent.toLowerCase().includes(t) ? 'block' : 'none';
    });
}

// ==================== AUTOCOMPLETE ====================
function criarAutocomplete(id, opcoes, valorAtual, placeholder) {
    const unicas = [...new Set(opcoes.filter(o => o && o !== ''))].sort();
    return `<div class="autocomplete-wrapper" id="${id}_acw">
        <input type="text" id="${id}" class="form-control" placeholder="${placeholder}" value="${valorAtual||''}" autocomplete="off">
        <div class="autocomplete-list" id="${id}_list">
            ${unicas.map(o=>`<div class="autocomplete-item" data-value="${String(o).replace(/"/g,'&quot;')}">${o}</div>`).join('')}
        </div>
    </div>`;
}

function initAutocomplete(id, callback) {
    const input = document.getElementById(id);
    const list  = document.getElementById(id+'_list');
    if (!input || !list) return;
    input.addEventListener('input', function() {
        const t = this.value.toLowerCase();
        let any = false;
        list.querySelectorAll('.autocomplete-item').forEach(item => {
            const txt = item.getAttribute('data-value').toLowerCase();
            const match = txt.includes(t);
            item.style.display = match ? '' : 'none';
            if (match) { item.innerHTML = item.getAttribute('data-value').replace(new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>'); any = true; }
        });
        list.classList.toggle('show', any && t.length > 0);
        if (callback) callback(this.value);
    });
    input.addEventListener('focus', function() {
        if (this.value.length > 0) { list.querySelectorAll('.autocomplete-item').forEach(i=>i.style.display=''); list.classList.add('show'); }
    });
    input.addEventListener('blur', () => setTimeout(() => list.classList.remove('show'), 200));
    list.querySelectorAll('.autocomplete-item').forEach(item => {
        item.addEventListener('mousedown', function(e) {
            e.preventDefault();
            input.value = this.getAttribute('data-value');
            list.classList.remove('show');
            if (callback) callback(input.value);
        });
    });
}

// ==================== DATA DE ATUALIZAÇÃO ====================
async function setupAtualizacaoData() {
    const el = document.getElementById('data-atualizacao-header');
    try {
        // Tenta via GitHub API para achar o arquivo execucao mais recente
        const resp = await fetch(GITHUB_API_DATA);
        if (!resp.ok) throw new Error('api erro');
        const arquivos = await resp.json();
        const execFiles = arquivos
            .filter(f => f.name && f.name.match(/^execucao\d{4}\.csv$/))
            .sort((a,b) => b.name.localeCompare(a.name));
        if (execFiles.length > 0) {
            const arqRecente = execFiles[0].name;
            const commitResp = await fetch(`https://api.github.com/repos/transparencia-mg/portal_convenios_entrada/commits?path=dataset/data/${arqRecente}&per_page=1`);
            if (commitResp.ok) {
                const commits = await commitResp.json();
                if (commits && commits.length > 0) {
                    el.textContent = new Date(commits[0].commit.committer.date).toLocaleDateString('pt-BR');
                    return;
                }
            }
            // Fallback: extrai ano do nome
            const match = arqRecente.match(/execucao(\d{4})\.csv/);
            if (match) { el.textContent = match[1]; return; }
        }
        // Fallback: tenta pegar data do commit do execucao2026.csv diretamente
        const fb = await fetch('https://api.github.com/repos/transparencia-mg/portal_convenios_entrada/commits?path=dataset/data/execucao2026.csv&per_page=1');
        if (fb.ok) {
            const cs = await fb.json();
            if (cs && cs.length > 0) { el.textContent = new Date(cs[0].commit.committer.date).toLocaleDateString('pt-BR'); return; }
        }
        el.textContent = '2026';
    } catch(e) {
        // Último fallback: data do commit do execucao2026.csv
        try {
            const fb = await fetch('https://api.github.com/repos/transparencia-mg/portal_convenios_entrada/commits?path=dataset/data/execucao2026.csv&per_page=1');
            if (fb.ok) {
                const cs = await fb.json();
                if (cs && cs.length > 0) { document.getElementById('data-atualizacao-header').textContent = new Date(cs[0].commit.committer.date).toLocaleDateString('pt-BR'); return; }
            }
        } catch(e2) {}
        document.getElementById('data-atualizacao-header').textContent = 'Não disponível';
    }
}

// ==================== CARREGAMENTO ====================
async function carregarDados() {
    mostrarLoading(true, 'Carregando convênios...');
    try {
        const convResp = await fetch(CONVENIOS_URL);
        if (convResp.ok) {
            conveniosData = parseCSV(await convResp.text());
            conveniosData.forEach(c => { if (!c.ano && c.data_assinatura) c.ano = getAnoFromData(c.data_assinatura); });
            siafiValidosSet.clear();
            conveniosData.forEach(c => { if (c.codigo_siafi?.trim()) siafiValidosSet.add(c.codigo_siafi.trim()); });
        }
        mostrarLoading(true, 'Carregando execução...');
        for (const url of EXECUCAO_URLS) {
            try {
                const r = await fetch(url);
                if (r.ok) {
                    const dados = parseCSV(await r.text());
                    execucaoData.push(...dados.filter(d => siafiValidosSet.has(d.no_siafi?.trim())));
                }
            } catch(e) {}
        }
        mostrarLoading(true, 'Carregando arrecadação...');
        const arrecResp = await fetch(ARRECADACAO_URL);
        if (arrecResp.ok) {
            const dados = parseCSV(await arrecResp.text());
            arrecadacaoData = dados.filter(d => siafiValidosSet.has(d.no_siafi?.trim()));
        }
        renderizarFormalizados();
        renderizarIndividual();
        renderizarExecucao();
        renderizarArrecadacao();
        renderizarDownloads();

}

function renderizarTabelaFormalizados() {
    let df = conveniosData.filter(c => {
        if (filtrosFormalizados.ano && c.ano != filtrosFormalizados.ano) return false;
        if (filtrosFormalizados.proponente && c.proponente !== filtrosFormalizados.proponente) return false;
        return true;
    });
    const totalConvenios = df.length;
    const totalVP = df.reduce((a,c) => a+(parseFloat(c.valor_proponente)||0), 0);
    const totalVC = df.reduce((a,c) => a+(parseFloat(c.valor_concedente)||0), 0);
    const totalVT = df.reduce((a,c) => a+(parseFloat(c.valor_total_convenio)||0), 0);
    const map = new Map();
    df.forEach(c => {
        const n = c.proponente; if (!n) return;
        if (!map.has(n)) map.set(n, { proponente:n, convenios:0, valorProponente:0, valorConcedente:0, valorTotal:0 });
        const p = map.get(n); p.convenios++;
        p.valorProponente += parseFloat(c.valor_proponente)||0;
        p.valorConcedente += parseFloat(c.valor_concedente)||0;
        p.valorTotal += parseFloat(c.valor_total_convenio)||0;
    });
    let tabela = ordenarDados(Array.from(map.values()), ordenacaoFormalizados.coluna, ordenacaoFormalizados.direcao);
    const total = tabela.length;
    const ipp = itensPorPagina.formalizados;
    const inicio = (paginaAtual.formalizados-1)*ipp;
    const pagina = tabela.slice(inicio, inicio+ipp);
    const met = document.getElementById('metricas-formalizados');
    if (met) met.innerHTML = `
        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Total de Convênios</div><div class="metric-body"><div class="metric-value">${totalConvenios.toLocaleString('pt-BR')}</div></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Valor Proponente</div><div class="metric-body"><div class="metric-value" style="font-size:15px">${formatarMoeda(totalVP)}</div></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Valor Concedente</div><div class="metric-body"><div class="metric-value" style="font-size:15px">${formatarMoeda(totalVC)}</div></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div class="metric-header">Valor Total</div><div class="metric-body"><div class="metric-value" style="font-size:15px">${formatarMoeda(totalVT)}</div></div></div></div>
        </div>`;
    const th = (col, lbl) => `<th class="${ordenacaoFormalizados.coluna===col?ordenacaoFormalizados.direcao:''}" onclick="ordenar('formalizados','${col}')">${lbl}</th>`;
    const tab = document.getElementById('tabela-formalizados');
    if (!tab) return;
    tab.innerHTML = `
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-export" onclick="exportarFormalizadosCSV()"><i class="material-icons">description</i> CSV</button>
                <button class="btn-export" onclick="exportarFormalizadosPDF()"><i class="material-icons">print</i> PDF</button>
                <button class="btn-export" onclick="copiarLink()"><i class="material-icons">link</i> Copiar Link</button>
            </div>
            <div class="toolbar-right">
                <span class="table-badge">${total} proponentes</span>
            </div>
        </div>
        <div class="table-container">
            <table class="table">
                <thead><tr>
                    ${th('proponente','Proponente')}
                    ${th('convenios','Qtd')}
                    ${th('valorProponente','Valor Proponente')}
                    ${th('valorConcedente','Valor Concedente')}
                    ${th('valorTotal','Valor Total')}
                </tr></thead>
                <tbody>
                    ${pagina.map(item=>`<tr>
                        <td><a href="#" class="orgao-link" onclick="irParaConsultaIndividual('${item.proponente.replace(/'/g,"\\'")}');return false;">${item.proponente}</a></td>
                        <td class="text-center">${item.convenios}</td>
                        <td class="text-end">${formatarMoeda(item.valorProponente)}</td>
                        <td class="text-end">${formatarMoeda(item.valorConcedente)}</td>
                        <td class="text-end">${formatarMoeda(item.valorTotal)}</td>
                    </tr>`).join('')}
                </tbody>
                <tfoot class="table-footer-total"><tr>
                    <td class="fw-bold">TOTAL GERAL</td>
                    <td class="text-center fw-bold">${tabela.reduce((a,r)=>a+r.convenios,0)}</td>
                    <td class="text-end fw-bold">${formatarMoeda(tabela.reduce((a,r)=>a+r.valorProponente,0))}</td>
                    <td class="text-end fw-bold">${formatarMoeda(tabela.reduce((a,r)=>a+r.valorConcedente,0))}</td>
                    <td class="text-end fw-bold">${formatarMoeda(tabela.reduce((a,r)=>a+r.valorTotal,0))}</td>
                </tr></tfoot>
            </table>
        </div>
        ${renderizarPaginacao('formalizados', total)}
        <div style="display:flex;justify-content:flex-end;margin-top:12px;">
            <button class="btn-topo" onclick="voltarAoTopo()"><i class="material-icons">arrow_upward</i> Topo</button>
        </div>`;
    renderizarGraficosFormalizados(df);
    setTimeout(iframeUpdateHeight, 300);
}

function renderizarGraficosFormalizados(dados) {
    const PAL = ['#1a3a5c','#b93c42','#2e7d32','#f57c00','#6a1b9a','#0277bd','#4e342e','#00695c','#558b2f','#ad1457','#37474f','#ff6f00'];
    const sitMap = {};
    dados.forEach(c => { const s=c.situacao||'Não informada'; sitMap[s]=(sitMap[s]||0)+1; });
    const sitLabels = Object.keys(sitMap).sort((a,b)=>sitMap[b]-sitMap[a]);
    const ctx1 = document.getElementById('chartSituacao');
    if (ctx1) {
        if (chartSituacao) chartSituacao.destroy();
        chartSituacao = new Chart(ctx1, { type:'doughnut', data:{ labels:sitLabels, datasets:[{ data:sitLabels.map(k=>sitMap[k]), backgroundColor:PAL.slice(0,sitLabels.length), borderWidth:2, borderColor:'#fff' }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ font:{ size:11 }, boxWidth:14 } }, tooltip:{ callbacks:{ label:ctx=>` ${ctx.label}: ${ctx.raw}` } } } } });
    }
    const instMap = {};
    dados.forEach(c => { const i=c.instrumento||'Não informado'; instMap[i]=(instMap[i]||0)+1; });
    const instLabels = Object.keys(instMap).sort((a,b)=>instMap[b]-instMap[a]).slice(0,12);
    const ctx2 = document.getElementById('chartInstrumento');
    if (ctx2) {
        if (chartInstrumento) chartInstrumento.destroy();
        chartInstrumento = new Chart(ctx2, { type:'bar', data:{ labels:instLabels, datasets:[{ data:instLabels.map(k=>instMap[k]), backgroundColor:PAL.slice(0,instLabels.length), borderRadius:4 }] }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{ legend:{ display:false } }, scales:{ x:{ beginAtZero:true, ticks:{ font:{ size:11 } } }, y:{ ticks:{ font:{ size:11 } } } } } });
    }
}

function renderizarTabelaExecucao() {
    const conveniosMap = new Map();
    conveniosData.forEach(c => { if (c.codigo_siafi) conveniosMap.set(c.codigo_siafi, c); });

    let df = execucaoData.filter(e => {
        if (filtrosExecucao.ano && e.ano_exercicio_receita != filtrosExecucao.ano) return false;
        if (filtrosExecucao.numeroSiafi && !e.no_siafi?.toLowerCase().includes(filtrosExecucao.numeroSiafi.toLowerCase())) return false;
        if (filtrosExecucao.anoEmpenho && !String(e.ano_empenho||'').toLowerCase().includes(String(filtrosExecucao.anoEmpenho).toLowerCase())) return false;
        if (filtrosExecucao.numeroEmpenho && !e.no_empenho?.toLowerCase().includes(filtrosExecucao.numeroEmpenho.toLowerCase())) return false;
        if (filtrosExecucao.razaoSocialCredor && !e.razao_social_credor?.toLowerCase().includes(filtrosExecucao.razaoSocialCredor.toLowerCase())) return false;
        if (filtrosExecucao.cnpjCpfCredor && !e.cnpj_cpf_credor?.replace(/\D/g,'').includes(filtrosExecucao.cnpjCpfCredor.replace(/\D/g,''))) return false;
        return true;
    });

    if (buscas.execucao) {
        const t = buscas.execucao.toLowerCase();
        df = df.filter(e => e.razao_social_credor?.toLowerCase().includes(t) || e.no_siafi?.toLowerCase().includes(t) || e.no_empenho?.toLowerCase().includes(t));
    }

    df = df.map(e => ({
        ...e,
        proponente: conveniosMap.get(e.no_siafi)?.proponente || '-',
        concedente: conveniosMap.get(e.no_siafi)?.concedente || '-',
        situacao_convenio: conveniosMap.get(e.no_siafi)?.situacao || '-'
    }));

    if (filtrosExecucao.proponente) df = df.filter(e => e.proponente?.toLowerCase().includes(filtrosExecucao.proponente.toLowerCase()));
    if (filtrosExecucao.concedente) df = df.filter(e => e.concedente?.toLowerCase().includes(filtrosExecucao.concedente.toLowerCase()));
    if (filtrosExecucao.situacaoConvenio) df = df.filter(e => e.situacao_convenio === filtrosExecucao.situacaoConvenio);

    df = ordenarDados(df, ordenacaoExecucao.coluna, ordenacaoExecucao.direcao);
    const total = df.length;
    const ipp = itensPorPagina.execucao;
    const inicio = (paginaAtual.execucao-1)*ipp;
    const pagina = df.slice(inicio, inicio+ipp);
    const colsVis = ordemColunasExecucao.filter(col => colunasVisiveisExecucao[col]);
    const totalEmp = df.reduce((s,i)=>s+(parseFloat(i.valor_empenhado)||0),0);
    const totalLiq = df.reduce((s,i)=>s+(parseFloat(i.valor_liquidado)||0),0);
    const totalPago = df.reduce((s,i)=>s+(parseFloat(i.valor_pago)||0),0);

    const toolbar = document.getElementById('toolbar-execucao');
    if (toolbar) toolbar.innerHTML = `
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-export" onclick="exportarExecucaoCSV()"><i class="material-icons">description</i> CSV</button>
                <button class="btn-export" onclick="exportarExecucaoPDF()"><i class="material-icons">print</i> PDF</button>
                <button class="btn-export" onclick="copiarLink()"><i class="material-icons">link</i> Copiar Link</button>
                <div class="col-sel-wrap">
                    <button class="col-sel-btn" onclick="toggleColSel('execucao')"><i class="material-icons">view_column</i> Colunas</button>
                    <div class="col-sel-popup" id="colSelPopup_execucao">
                        <div class="col-sel-title">Exibir colunas:</div>
                        ${ordemColunasExecucao.map(col=>`<label><input type="checkbox" ${colunasVisiveisExecucao[col]?'checked':''} onchange="toggleColunaExecucao('${col}')"> ${colNomesExecucao[col]||col}</label>`).join('')}
                    </div>
                </div>
            </div>
            <div class="toolbar-right">
                <span class="table-badge">${total.toLocaleString('pt-BR')} registros</span>
                <div class="table-search-container">
                    <i class="material-icons" style="font-size:14px;color:#94a3b8;">search</i>
                    <input class="table-search-input" placeholder="Busca rápida..." value="${buscas.execucao}" oninput="onBusca('execucao',this.value)">
                </div>
            </div>
        </div>`;

    const tab = document.getElementById('tabela-execucao');
    if (!tab) return;
    tab.innerHTML = `
        <div class="table-container">
            <div class="table-fixed-header-container">
                <table class="table" style="min-width:1400px">
                    <thead><tr>
                        ${colsVis.map(col=>`<th class="${ordenacaoExecucao.coluna===col?ordenacaoExecucao.direcao:''}" onclick="ordenar('execucao','${col}')">${colNomesExecucao[col]||col}</th>`).join('')}
                        <th>AÇÕES</th>
                    </tr></thead>
                    <tbody>
                        ${pagina.map(item=>{
                            const convenio = conveniosMap.get(item.no_siafi);
                            const link = convenio ? getLinkInteiroTeor(convenio) : null;
                            const itemJSON = JSON.stringify(item).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                            return `<tr>
                                ${colsVis.map(col=>{
                                    let v = item[col]??'-';
                                    if (v===''||v===null||v===undefined) v='-';
                                    if (['valor_empenhado','valor_liquidado','valor_pago'].includes(col)) v=formatarMoeda(v);
                                    if (col==='cnpj_cpf_credor') v=formatarCpfCnpj(String(item[col]||''));
                                    if (col==='no_siafi'&&v!=='-') return `<td>${link?`<a href="${link}" target="_blank" class="siafi-link">${v}</a>`:v}</td>`;
                                    return `<td>${v}</td>`;
                                }).join('')}
                                <td class="text-center"><button class="btn-action" title="Ver detalhes" onclick='abrirModalExecucaoIdx(${inicio+pagina.indexOf(item)})'><i class="material-icons" style="font-size:15px">visibility</i></button></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                    <tfoot class="table-footer-total"><tr>
                        <td colspan="${colsVis.length - 2}" class="text-end fw-bold">TOTAIS:</td>
                        <td class="text-end fw-bold">${formatarMoeda(totalEmp)}</td>
                        <td class="text-end fw-bold">${formatarMoeda(totalLiq)}</td>
                        <td class="text-end fw-bold">${formatarMoeda(totalPago)}</td>
                        <td></td>
                    </tr></tfoot>
                </table>
            </div>
        </div>
        ${renderizarPaginacao('execucao', total)}
        <div style="display:flex;justify-content:flex-end;margin-top:12px;">
            <button class="btn-topo" onclick="voltarAoTopo()"><i class="material-icons">arrow_upward</i> Topo</button>
        </div>`;

    // Guarda df filtrado para o modal por índice
    window._dfExecucao = df;
}

// Modal execução por índice (evita JSON.stringify com aspas problemáticas)
function abrirModalExecucaoIdx(idx) {
    const item = (window._dfExecucao || [])[idx];
    if (!item) return;
    abrirModalExecucao(item);
}

function limparFiltrosExecucao() {
    filtrosExecucao = { ano:'', numeroSiafi:'', anoEmpenho:'', numeroEmpenho:'', proponente:'', concedente:'', situacaoConvenio:'', razaoSocialCredor:'', cnpjCpfCredor:'' };
    buscas.execucao = '';
    ['anoExecucao_input','situacaoExecucao_input','filtroSiafiExecucao','filtroAnoEmpenhoExecucao','filtroNumeroEmpenhoExecucao',
     'filtroProponenteExecucao','filtroConcedenteExecucao','filtroRazaoCredorExecucao','filtroCnpjCredorExecucao'].forEach(id=>{

function toggleColunaExecucao(col) { colunasVisiveisExecucao[col]=!colunasVisiveisExecucao[col]; renderizarTabelaExecucao(); }

let _modalItemAtual = null;

function exportarModalPDF() {

function abrirModalDetalhesConvenio(item) {
    if (!item) return;
    _modalItemAtual = item;
    const todosLinks = getTodosLinks(item);
    const grupos = {
        '📋 IDENTIFICAÇÃO': ['codigo_siafi','codigo_sigcon','sei','instrumento','ano'],
        '🏢 PARTES': ['proponente','concedente','esfera_concedente'],
        '💰 FINANCEIRO': ['valor_proponente','valor_concedente','valor_total_convenio','tipo_contrapartida'],
        '📅 DATAS': ['data_assinatura','data_publicacao','inicio_vigencia','termino_vigencia'],
        '📄 INFORMAÇÕES': ['objeto','situacao']
    };
    let html = '';
    if (todosLinks.length > 0) {
        html += `<div class="alert alert-info mb-3"><i class="material-icons">link</i> <strong>Documentos:</strong><div class="mt-2 d-flex flex-wrap gap-2">`;
        todosLinks.forEach(l => { html += `<a href="${l.url}" target="_blank" class="btn-link-document"><i class="material-icons">open_in_new</i> ${l.label}</a>`; });
        html += `</div></div>`;
    }
    for (const [titulo, campos] of Object.entries(grupos)) {
        let conteudo = '';
        for (const campo of campos) {
            const valor = item[campo];
            if (valor && valor !== '' && valor !== '-') {
                let vd = campo.includes('valor') ? formatarMoeda(valor) : (campo.includes('data')||campo.includes('vigencia')||campo.includes('publicacao')||campo.includes('assinatura')) ? formatarData(valor) : valor;
                conteudo += `<div class="info-row"><div class="info-label">${campo.replace(/_/g,' ').toUpperCase()}:</div><div class="info-value">${vd}</div></div>`;
            }
        }
        if (conteudo) html += `<div class="info-section"><h6>${titulo}</h6>${conteudo}</div>`;
    }
    document.getElementById('modalContent').innerHTML = html;
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

(function() {
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 30;
        try { window.parent.postMessage({ iframeHeight: h, iframeResize: true, type:'resize' }, '*'); } catch(e) {}
    }
    if (window.ResizeObserver) new ResizeObserver(sendHeight).observe(document.body);
    else { window.addEventListener('resize', sendHeight); setInterval(sendHeight, 2000); }
    sendHeight();
})();
