<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dashboard de Convênios - Transparência MG</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* ==================== VARIÁVEIS ==================== */
        :root {
            --primary-dark: #1a3a5c;
            --primary-darker: #0f2a44;
            --accent-red: #b93c42;
            --background-light: #f5f7fa;
        }

        /* ==================== RESET E BASE ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--background-light); 
            padding-bottom: 15px; 
        }
        
        html { }

        /* ==================== CONTAINERS ==================== */
        .dashboard-container { 
            width: 100%; 
            max-width: 95% !important; 
            padding: 0 20px; 
            margin: 0 auto; 
        }
        
        .main-container, .container.dashboard-spacing, .tab-content, .table-container { 
            height: auto !important; 
            min-height: auto !important; 
            overflow: visible !important; 
            position: relative; 
        }
        
        .table-container { 
            overflow-x: auto !important; 
            border-radius: 10px; 
            background: white; 
            box-shadow: 0 3px 12px rgba(0,0,0,0.06); 
        }

        /* ==================== NAVEGAÇÃO ==================== */
        .nav-tabs-container { 
            background: transparent; 
            padding: 10px 0; 
            margin: 15px 0; 
        }
        
        .nav-tabs { 
            border: none !important; 
            gap: 10px; 
            flex-wrap: wrap; 
        }
        
        .nav-tabs .nav-link { 
            border: none !important; 
            background: #ffffff !important; 
            border-radius: 10px !important; 
            padding: 10px 24px !important; 
            font-weight: 600; 
            font-size: 14px; 
            color: #1a3a5c !important; 
            display: inline-flex !important; 
            align-items: center; 
            gap: 8px; 
        }
        
        .nav-tabs .nav-link.active { 
            background: #234c63 !important; 
            color: #fff !important; 
        }

        /* ==================== FILTROS ==================== */
        .filter-container { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 3px 12px rgba(0,0,0,0.08); 
            padding: 20px; 
            margin-bottom: 20px; 
        }
        
        .filter-label { 
            font-size: 12px; 
            font-weight: 600; 
            color: #1a3a5c; 
            margin-bottom: 4px; 
            text-transform: uppercase; 
        }
        
        .form-control, .form-select { 
            border: 2px solid #e9ecef; 
            border-radius: 6px; 
            padding: 6px 10px; 
            font-size: 13px; 
        }
        
        .form-control:focus, .form-select:focus { 
            border-color: var(--accent-red); 
            box-shadow: 0 0 0 2px rgba(185,60,66,0.15); 
        }

        /* ==================== BOTÕES ==================== */
        .btn-pesquisa, .btn-limpar { 
            border: none; 
            padding: 8px 20px; 
            font-weight: 600; 
            border-radius: 6px; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer;
            height: 38px;
        }
        
        .btn-pesquisa { background: #20445d; color: white; }
        .btn-pesquisa:hover { background: var(--accent-red); }
        
        .btn-limpar { background: white; border: 2px solid var(--primary-darker); color: var(--primary-darker); }
        .btn-limpar:hover { background-color: #132837; color: white; border-color: #132837; }
        
        .btn-export { 
            background: #eeeff5; 
            border: 1px solid #d6dee6; 
            color: #1a3a5c; 
            padding: 5px 12px; 
            border-radius: 6px; 
            font-size: 12px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px; 
        }
        
        .btn-export:hover { background-color: #1a3a5c; color: white; }
        
        .btn-action { 
            padding: 5px; 
            border-radius: 6px; 
            border: 1.5px solid #1a3a5c; 
            background: white; 
            color: #1a3a5c; 
            width: 30px; 
            height: 30px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
        }
        
        .btn-action:hover { background-color: #1a3a5c; color: white; }
        
        .btn-link-document { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 11px; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px; 
        }
        
        .btn-link-document:hover { background: #218838; color: white; }

        /* ==================== CARDS MÉTRICAS ==================== */
        .metric-card { 
            background: white; 
            border-radius: 8px; 
            border: 1px solid #e5e9ef; 
            box-shadow: 0 3px 12px rgba(0,0,0,0.06); 
            margin-bottom: 20px; 
        }
        
        .metric-header { 
            background: #20445d; 
            color: white; 
            font-size: 13px; 
            font-weight: 600; 
            padding: 8px 15px; 
        }
        
        .metric-body { padding: 10px 15px; }
        .metric-value { font-size: 18px; font-weight: 700; color: #1a3a5c; }

        /* ==================== TABELAS ==================== */
        .table { width: 100%; font-size: 12px; border-collapse: collapse; }
        
        .table th { 
            background-color: #54697b; 
            color: white; 
            padding: 10px 8px; 
            font-weight: 600; 
            white-space: nowrap; 
            border: 1px solid #d6dee6; 
            cursor: pointer; 
            user-select: none; 
            text-align: center; 
        }
        
        .table th:hover { background-color: #6a7f8e; }
        .table th.asc:after { content: ' ↑'; }
        .table th.desc:after { content: ' ↓'; }
        
        .table td { 
            padding: 8px; 
            border: 1px solid #d6dee6; 
            vertical-align: middle; 
        }
        
        .table td.text-center { text-align: center; }
        .table td.text-end { text-align: right; }
        .table tbody tr:hover { background-color: rgba(41,67,90,0.04); }
        
        .table-footer-total { background-color: #e9ecef; font-weight: 700; border-top: 2px solid #1a3a5c; }
        .table-footer-total td { background-color: #f8f9fa; font-weight: 700; }
        
        .metadata-table th { background-color: #20445d; color: white; font-size: 12px; }
        .metadata-table td { font-size: 12px; }

        /* ==================== PAGINAÇÃO ==================== */
        .pagination-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 15px; 
            background: white; 
            border: 1px solid #dee2e6; 
            border-top: none; 
            border-radius: 0 0 10px 10px; 
            flex-wrap: wrap; 
            gap: 10px; 
        }
        
        .items-per-page { 
            height: 32px; 
            min-width: 120px; 
            border-radius: 6px; 
            border: 1px solid #d6dee6; 
            padding: 4px 8px; 
            font-size: 12px; 
        }

        /* ==================== TOOLBAR ==================== */
        .toolbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            flex-wrap: wrap; 
            gap: 10px; 
        }
        
        .toolbar-right { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex-wrap: wrap; 
        }
        
        .search-input-small { 
            width: 250px; 
            font-size: 12px; 
            padding: 6px 12px; 
            border-radius: 6px; 
            border: 1px solid #d6dee6; 
        }

        /* ==================== LINKS ==================== */
        .orgao-link, .siafi-link { 
            color: #006a82; 
            text-decoration: none; 
            font-weight: 500; 
            cursor: pointer; 
        }
        
        .orgao-link:hover, .siafi-link:hover { 
            color: var(--accent-red); 
            text-decoration: underline; 
        }

        /* ==================== SELECT COM BUSCA ==================== */
        .select-with-search { position: relative; }
        
        .select-with-search input { 
            width: 100%; 
            padding: 6px 10px; 
            border: 2px solid #e9ecef; 
            border-radius: 6px; 
            font-size: 13px; 
        }
        
        .select-options { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            right: 0; 
            max-height: 200px; 
            overflow-y: auto; 
            background: white; 
            border: 1px solid #dee2e6; 
            border-radius: 6px; 
            z-index: 1000; 
        }
        
        .select-options.show { display: block; }
        
        .select-option { 
            padding: 6px 10px; 
            cursor: pointer; 
            font-size: 13px; 
        }
        
        .select-option:hover { background: #f0f0f0; }

        /* ==================== COLUMN SELECTOR ==================== */
        .column-selector-icon { 
            position: relative; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            cursor: pointer; 
            background: #eeeff5; 
            border: 1px solid #d6dee6; 
            border-radius: 20px; 
            padding: 4px 10px; 
            height: 32px; 
            font-size: 12px; 
        }
        
        .column-selector-popup { 
            display: none; 
            position: absolute; 
            right: 0; 
            top: 35px; 
            background: white; 
            border: 1px solid #dee2e6; 
            border-radius: 10px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
            width: 260px; 
            z-index: 1000; 
            padding: 12px; 
        }
        
        .column-selector-popup.show { display: block; }
        
        .column-selector-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            max-height: 200px; 
            overflow-y: auto; 
        }
        
        .column-selector-item { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            font-size: 11px; 
            min-width: calc(50% - 8px); 
        }

        /* ==================== MODAL ==================== */
        .modal-creative .modal-header { 
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%); 
            color: white; 
        }
        
        .modal-body .info-section { 
            background: #f8f9fa; 
            border-radius: 8px; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-left: 4px solid #1a3a5c; 
        }
        
        .modal-body .info-section h6 { 
            color: #1a3a5c; 
            font-weight: 700; 
            margin-bottom: 12px; 
        }
        
        .modal-body .info-row { 
            display: flex; 
            padding: 6px 0; 
            border-bottom: 1px solid #e9ecef; 
        }
        
        .modal-body .info-label { 
            width: 40%; 
            font-weight: 600; 
            color: #495057; 
        }
        
        .modal-body .info-value { 
            width: 60%; 
            color: #212529; 
        }

        /* ==================== LOADING ==================== */
        .loading-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255,255,255,0.9); 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* ==================== GRÁFICOS ==================== */
        .chart-card {
            background: white;
            border-radius: 10px;
            border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            padding: 18px;
            margin-bottom: 20px;
        }
        .chart-card h6 {
            font-weight: 700;
            color: #1a3a5c;
            margin-bottom: 14px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chart-wrapper { position: relative; height: 280px; }

        /* ==================== AUTOCOMPLETE ==================== */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            max-height: 220px;
            overflow-y: auto;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            z-index: 1050;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .autocomplete-list.show { display: block; }
        .autocomplete-item {
            padding: 7px 10px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
        }
        .autocomplete-item:hover, .autocomplete-item.active { background: #e8f0fe; }
        .autocomplete-item mark { background: #fff3cd; padding: 0; font-weight: 700; }

        /* ==================== IFRAME FIX ==================== */
        html, body {
            overflow: visible !important;
            height: auto !important;
        }

        /* ==================== RESPONSIVIDADE ==================== */
        @media (max-width: 768px) { 
            .dashboard-container { padding: 0 10px; } 
            .toolbar { flex-direction: column; align-items: stretch; } 
            .toolbar-right { justify-content: space-between; }
            .search-input-small { width: 100%; } 
            .modal-body .info-label { width: 45%; } 
            .modal-body .info-value { width: 55%; } 
            .items-per-page { min-width: 100px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="nav-tabs-container">
        <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="formalizados-tab" data-bs-toggle="tab" data-bs-target="#formalizados"><i class="material-icons">assignment</i>Visão Geral</button></li>

        <div class="spinner-border text-primary" role="status"></div>
        <div class="text-primary fw-bold mt-3">Carregando dados...</div>
    </div>
</div>

<script>
// ==================== VARIÁVEIS GLOBAIS ====================
let conveniosData = [];
let execucaoData = [];
let arrecadacaoData = [];
let siafiValidosSet = new Set();

const CONVENIOS_URL = 'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/convenios.csv';
const ARRECADACAO_URL = 'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/arrecadacao.csv';
const EXECUCAO_URLS = [
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2026.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2025.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2024.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2023.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2022.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2021.csv',
    'https://raw.githubusercontent.com/transparencia-mg/portal_convenios_entrada/refs/heads/main/dataset/data/execucao2020.csv'
];

// Estado de filtros (fonte de verdade, não dependente do DOM)
let filtrosFormalizados = { ano: '', proponente: '' };
let filtrosIndividual = { ano: '', codigoSiafi: '', codigoSigcon: '', instrumento: '', proponente: '', concedente: '', situacao: '', esferaConcedente: '', tipoContrapartida: '' };
let filtrosExecucao = { ano: '', numeroSiafi: '', anoEmpenho: '', numeroEmpenho: '', proponente: '', concedente: '', situacaoConvenio: '', razaoSocialCredor: '', cnpjCpfCredor: '' };
let filtrosArrecadacao = { ano: '', numeroSiafi: '', tipoReceita: '', fonte: '', unidadeOrcamentaria: '', classificacaoOrcamentaria: '' };

let chartSituacao = null;
let chartInstrumento = null;

let paginaAtual = { formalizados: 1, individual: 1, execucao: 1, arrecadacao: 1 };
let itensPorPagina = 25;
let buscaIndividual = '';
let buscaExecucao = '';
let buscaArrecadacao = '';

let ordenacaoFormalizados = { coluna: 'proponente', direcao: 'asc' };
let ordenacaoIndividual = { coluna: 'proponente', direcao: 'asc' };
let ordenacaoExecucao = { coluna: 'no_siafi', direcao: 'asc' };
let ordenacaoArrecadacao = { coluna: 'no_siafi', direcao: 'asc' };

let colunasVisiveisIndividual = {
    codigo_siafi: true, codigo_sigcon: true, sei: true, instrumento: true,
    proponente: true, concedente: true, esfera_concedente: true, objeto: false,
    situacao: true, tipo_contrapartida: true, data_assinatura: true, data_publicacao: true,
    inicio_vigencia: true, termino_vigencia: true
};

let colunasVisiveisExecucao = {
    no_siafi: true, proponente: true, concedente: true, situacao_convenio: true,
    no_empenho: true, ano_empenho: true, razao_social_credor: true, cnpj_cpf_credor: true,
    valor_empenhado: true, valor_liquidado: true, valor_pago: true
};

let colunasVisiveisArrecadacao = {
    no_siafi: true, unidade_orcamentaria: true, ano_exercicio_receita: true,
    classificacao_orcamentaria: true, tipo_de_receita: true, fonte: true,
    data_da_arrecadacao: true, receita_arrecadada: true
};

const ordemColunasIndividual = ['codigo_siafi','codigo_sigcon','sei','instrumento','proponente','concedente','esfera_concedente','objeto','situacao','tipo_contrapartida','data_assinatura','data_publicacao','inicio_vigencia','termino_vigencia'];
const ordemColunasExecucao = ['no_siafi','proponente','concedente','situacao_convenio','no_empenho','ano_empenho','razao_social_credor','cnpj_cpf_credor','valor_empenhado','valor_liquidado','valor_pago'];
const ordemColunasArrecadacao = ['no_siafi','unidade_orcamentaria','ano_exercicio_receita','classificacao_orcamentaria','tipo_de_receita','fonte','data_da_arrecadacao','receita_arrecadada'];

// ==================== FUNÇÕES AUXILIARES ====================
function mostrarLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

function formatarMoeda(valor) {
    if (!valor && valor !== 0) return 'R$ 0,00';
    let num = typeof valor === 'string' ? parseFloat(valor.replace(/\./g, '').replace(',', '.')) : valor;
    if (isNaN(num)) num = 0;
    return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function formatarCpfCnpj(valor) {
    if (!valor || valor === '-') return valor || '-';
    const digits = String(valor).replace(/\D/g, '');
    if (digits.length === 11) return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    if (digits.length === 14) return digits.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
    return valor;
}

// ==================== AUTOCOMPLETE ====================
function criarAutocomplete(id, opcoes, valorAtual, placeholder) {
    const opcoesUnicas = [...new Set(opcoes.filter(o => o && o !== ''))].sort();
    return `<div class="autocomplete-wrapper" id="${id}_acw">
        <input type="text" id="${id}" class="form-control" placeholder="${placeholder}" value="${valorAtual || ''}" autocomplete="off">
        <div class="autocomplete-list" id="${id}_list">
            ${opcoesUnicas.map(o => `<div class="autocomplete-item" data-value="${String(o).replace(/"/g,'&quot;')}">${o}</div>`).join('')}
        </div>
    </div>`;
}

function initAutocomplete(id, callback) {
    const input = document.getElementById(id);
    const list = document.getElementById(id + '_list');
    if (!input || !list) return;

    input.addEventListener('input', function() {
        const t = this.value.toLowerCase();
        let any = false;
        list.querySelectorAll('.autocomplete-item').forEach(item => {
            const txt = item.getAttribute('data-value').toLowerCase();
            const match = txt.includes(t);
            item.style.display = match ? '' : 'none';
            if (match) {
                item.innerHTML = item.getAttribute('data-value').replace(new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
                any = true;
            }
        });
        list.classList.toggle('show', any && t.length > 0);
        if (callback) callback(this.value);
    });

    input.addEventListener('focus', function() {
        if (this.value.length > 0) {
            list.querySelectorAll('.autocomplete-item').forEach(i => { i.style.display = ''; });
            list.classList.add('show');
        }
    });

    input.addEventListener('blur', () => setTimeout(() => list.classList.remove('show'), 200));

    list.querySelectorAll('.autocomplete-item').forEach(item => {
        item.addEventListener('mousedown', function(e) {
            e.preventDefault();
            input.value = this.getAttribute('data-value');
            list.classList.remove('show');
            if (callback) callback(input.value);
        });
    });
}


function formatarData(dataStr) {
    if (!dataStr || dataStr === '') return '-';

    let dataLimpa = dataStr.split(' ')[0];

    if (dataLimpa.includes('/')) return dataLimpa;

    const partes = dataLimpa.split('-');

    if (partes.length === 3) {
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    return dataLimpa;
}

function getLinkInteiroTeor(item) {
    if (item.inteiro_teor_do_instrumento_sigcon && item.inteiro_teor_do_instrumento_sigcon !== '' && item.inteiro_teor_do_instrumento_sigcon !== '#') return item.inteiro_teor_do_instrumento_sigcon;
    if (item.inteiro_teor_do_instrumento_transferegov && item.inteiro_teor_do_instrumento_transferegov !== '' && item.inteiro_teor_do_instrumento_transferegov !== '#') return item.inteiro_teor_do_instrumento_transferegov;
    return null;
}

function getTodosLinks(item) {
    // Coleta todos os campos que parecem ser links/termos aditivos
    const links = [];
    const camposLink = Object.keys(item).filter(k =>
        k.includes('inteiro_teor') || k.includes('termo_aditivo') || k.includes('aditivo') || k.includes('link') || k.includes('url')
    );
    camposLink.forEach(campo => {
        const val = item[campo];
        if (val && val !== '' && val !== '#' && (val.startsWith('http') || val.startsWith('www'))) {
            const label = campo.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            links.push({ label, url: val });
        }
    });
    return links;
}

function getAnoFromData(dataStr) {
    if (!dataStr || dataStr === '') return null;
    let dataLimpa = dataStr.split(' ')[0];
    if (dataLimpa.includes('/')) { const p = dataLimpa.split('/'); if (p.length === 3) return p[2]; }
    else if (dataLimpa.includes('-')) { const p = dataLimpa.split('-'); if (p.length === 3) return p[0]; }
    return null;
}

function parseCSV(texto) {
    const linhas = texto.trim().split('\n');
    let cabecalhos = linhas[0].split(';').map(h => h.trim().replace(/^\uFEFF/, '').replace(/^["']|["']$/g, '').toLowerCase().replace(/ /g, '_').replace(/\(|\)/g, '').replace(/_r$/, ''));
    if (cabecalhos[0] && cabecalhos[0].charCodeAt(0) === 65279) cabecalhos[0] = cabecalhos[0].substring(1);
    if (cabecalhos[0] === '' || cabecalhos[0] === 'ï»¿') cabecalhos[0] = 'uo';
    // Normaliza variantes de nomes de campo
    cabecalhos = cabecalhos.map(h => {
        if (h === 'tipo_de_contrapartida' || h === 'tipo_contrapartida_proponente' || h === 'tipo_contrapartida_do_proponente') return 'tipo_contrapartida';
        if (h === 'no_siafi' || h === 'numero_siafi' || h === 'num_siafi') return 'no_siafi';
        if (h === 'no_empenho' || h === 'numero_empenho' || h === 'num_empenho') return 'no_empenho';
        if (h === 'ano_do_empenho' || h === 'ano_exercicio_empenho') return 'ano_empenho';
        return h;
    });
    const dados = [];
    for (let i = 1; i < linhas.length; i++) {
        if (!linhas[i].trim()) continue;
        const valores = [];
        let campoAtual = '';
        let dentroAspas = false;
        for (let char of linhas[i]) {
            if (char === '"') dentroAspas = !dentroAspas;
            else if (char === ';' && !dentroAspas) { valores.push(campoAtual); campoAtual = ''; }
            else campoAtual += char;
        }
        valores.push(campoAtual);
        const linha = {};
        cabecalhos.forEach((cab, idx) => {
            let valor = valores[idx] || '';
            valor = valor.replace(/^["']|["']$/g, '').trim();
            if (cab.includes('valor') && valor) valor = parseFloat(valor.replace(/\./g, '').replace(',', '.')) || 0;
            linha[cab] = valor;
        });
        dados.push(linha);
    }
    return dados;
}

function ordenarDados(dados, coluna, direcao) {
    return [...dados].sort((a, b) => {
        let valA = a[coluna] ?? '';
        let valB = b[coluna] ?? '';
        const numA = parseFloat(valA);
        const numB = parseFloat(valB);
        if (!isNaN(numA) && !isNaN(numB)) {
            return direcao === 'asc' ? numA - numB : numB - numA;
        }
        valA = String(valA).toLowerCase();
        valB = String(valB).toLowerCase();
        if (direcao === 'asc') return valA > valB ? 1 : valA < valB ? -1 : 0;
        return valA < valB ? 1 : valA > valB ? -1 : 0;
    });
}

// Cria apenas o HTML do select; a inicialização é feita separadamente
function criarSelectComBusca(id, opcoes, valorAtual, placeholder) {
    const opcoesUnicas = [...new Set(opcoes.filter(o => o && o !== ''))].sort();
    let optionsHtml = `<div class="select-option" data-value="">Todos</div>`;
    optionsHtml += opcoesUnicas.map(o => `<div class="select-option" data-value="${String(o).replace(/"/g, '&quot;')}">${o}</div>`).join('');
    return `<div class="select-with-search" id="${id}_wrapper">
        <input type="text" id="${id}_input" class="form-control" placeholder="${placeholder}" value="${valorAtual || ''}" autocomplete="off" readonly>
        <div id="${id}_options" class="select-options">${optionsHtml}</div>
    </div>`;
}

// Inicializa um select com busca — seguro para chamar múltiplas vezes
function initSelectComBusca(id, callback) {
    const input = document.getElementById(`${id}_input`);
    const optionsDiv = document.getElementById(`${id}_options`);
    if (!input || !optionsDiv) return;

    // Remove readonly para permitir digitação de filtro
    input.removeAttribute('readonly');

    // Abre dropdown ao focar
    input.addEventListener('focus', () => {
        optionsDiv.classList.add('show');
        filtrarOpcoes(optionsDiv, '');
    });

    // Filtra opções ao digitar (não dispara re-render da tabela)
    input.addEventListener('input', function() {
        filtrarOpcoes(optionsDiv, this.value);
        optionsDiv.classList.add('show');
    });

    // Fecha ao sair do campo
    input.addEventListener('blur', () => {
        setTimeout(() => optionsDiv.classList.remove('show'), 200);
    });

    // Clique em opção: atualiza valor e dispara callback
    optionsDiv.querySelectorAll('.select-option').forEach(opt => {
        opt.addEventListener('mousedown', function(e) {
            e.preventDefault(); // evita blur antes do clique registrar
            const val = this.getAttribute('data-value');
            input.value = val === '' ? '' : this.textContent;
            optionsDiv.classList.remove('show');
            if (callback) callback(val);
        });
    });
}

function filtrarOpcoes(optionsDiv, termo) {
    const t = termo.toLowerCase();
    optionsDiv.querySelectorAll('.select-option').forEach(opt => {
        opt.style.display = opt.textContent.toLowerCase().includes(t) ? 'block' : 'none';
    });
}

function renderizarPaginacao(tipo, totalRegistros) {
    const totalPaginas = Math.ceil(totalRegistros / itensPorPagina);
    const pagina = paginaAtual[tipo];
    const inicio = (pagina - 1) * itensPorPagina + 1;
    const fim = Math.min(pagina * itensPorPagina, totalRegistros);
    if (totalRegistros === 0) return `<div class="pagination-container"><div>Nenhum registro encontrado</div></div>`;
    let botoes = '';
    for (let i = Math.max(1, pagina - 2); i <= Math.min(totalPaginas, pagina + 2); i++) {
        botoes += `<li class="page-item ${i === pagina ? 'active' : ''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${i});return false;">${i}</a></li>`;
    }
    return `<div class="pagination-container">
        <div>Mostrando ${inicio}–${fim} de ${totalRegistros}</div>
        <nav><ul class="pagination mb-0">
            <li class="page-item ${pagina===1?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${pagina-1});return false;">«</a></li>
            ${botoes}
            <li class="page-item ${pagina===totalPaginas?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${pagina+1});return false;">»</a></li>
        </ul></nav>
    </div>`;
}

function mudarPagina(tipo, pagina) {
    if (pagina < 1) return;
    paginaAtual[tipo] = pagina;
    if (tipo === 'formalizados') renderizarTabelaFormalizados();
    else if (tipo === 'individual') renderizarTabelaIndividual();
    else if (tipo === 'execucao') renderizarTabelaExecucao();
    else if (tipo === 'arrecadacao') renderizarTabelaArrecadacao();
}

function alterarItensPorPagina(tipo, valor) {
    itensPorPagina = parseInt(valor);
    paginaAtual[tipo] = 1;
    mudarPagina(tipo, 1);
}

function ordenar(tipo, coluna) {
    let ord;
    if (tipo === 'formalizados') ord = ordenacaoFormalizados;
    else if (tipo === 'individual') ord = ordenacaoIndividual;
    else if (tipo === 'execucao') ord = ordenacaoExecucao;
    else ord = ordenacaoArrecadacao;
    if (ord.coluna === coluna) ord.direcao = ord.direcao === 'asc' ? 'desc' : 'asc';
    else { ord.coluna = coluna; ord.direcao = 'asc'; }
    if (tipo === 'formalizados') renderizarTabelaFormalizados();
    else if (tipo === 'individual') renderizarTabelaIndividual();
    else if (tipo === 'execucao') renderizarTabelaExecucao();
    else renderizarTabelaArrecadacao();
}

async function carregarDados() {
    mostrarLoading(true);
    try {
        const conveniosResp = await fetch(CONVENIOS_URL);
        if (conveniosResp.ok) {
            conveniosData = parseCSV(await conveniosResp.text());
            conveniosData.forEach(c => { if (!c.ano && c.data_assinatura) c.ano = getAnoFromData(c.data_assinatura); });
            siafiValidosSet.clear();
            conveniosData.forEach(c => { if (c.codigo_siafi?.trim()) siafiValidosSet.add(c.codigo_siafi.trim()); });
        }
        for (const url of EXECUCAO_URLS) {
            try {
                const resp = await fetch(url);
                if (resp.ok) {
                    const dados = parseCSV(await resp.text());
                    execucaoData.push(...dados.filter(d => siafiValidosSet.has(d.no_siafi?.trim())));
                }
            } catch(e) { console.log(`Erro ao carregar: ${url}`); }
        }
        const arrecResp = await fetch(ARRECADACAO_URL);
        if (arrecResp.ok) {
            const dados = parseCSV(await arrecResp.text());
            arrecadacaoData = dados.filter(d => siafiValidosSet.has(d.no_siafi?.trim()));
        }
        renderizarFormalizados();
        renderizarIndividual();
        renderizarExecucao();
        renderizarArrecadacao();
        renderizarDownloads();
        setTimeout(iframeUpdateHeight, 500);
    } catch(erro) { console.error(erro); }
    finally { mostrarLoading(false); }
}

    const totalProponente = dadosFiltrados.reduce((acc, c) => acc + (parseFloat(c.valor_proponente) || 0), 0);
    const totalConcedente = dadosFiltrados.reduce((acc, c) => acc + (parseFloat(c.valor_concedente) || 0), 0);
    const totalGeral = dadosFiltrados.reduce((acc, c) => acc + (parseFloat(c.valor_total_convenio) || 0), 0);

function renderizarTabelaIndividual() {
    let dadosFiltrados = conveniosData.filter(c => {
        if (filtrosIndividual.ano && c.ano != filtrosIndividual.ano) return false;
        if (filtrosIndividual.codigoSiafi && !c.codigo_siafi?.toLowerCase().includes(filtrosIndividual.codigoSiafi.toLowerCase())) return false;
        if (filtrosIndividual.codigoSigcon && !c.codigo_sigcon?.toLowerCase().includes(filtrosIndividual.codigoSigcon.toLowerCase())) return false;
        if (filtrosIndividual.instrumento && c.instrumento !== filtrosIndividual.instrumento) return false;
        if (filtrosIndividual.proponente && !c.proponente?.toLowerCase().includes(filtrosIndividual.proponente.toLowerCase())) return false;
        if (filtrosIndividual.concedente && !c.concedente?.toLowerCase().includes(filtrosIndividual.concedente.toLowerCase())) return false;
        if (filtrosIndividual.situacao && c.situacao !== filtrosIndividual.situacao) return false;
        if (filtrosIndividual.esferaConcedente && c.esfera_concedente !== filtrosIndividual.esferaConcedente) return false;
        if (filtrosIndividual.tipoContrapartida && c.tipo_contrapartida !== filtrosIndividual.tipoContrapartida) return false;
        return true;
    });

    if (buscaIndividual) {
        const t = buscaIndividual.toLowerCase();
        dadosFiltrados = dadosFiltrados.filter(c => c.proponente?.toLowerCase().includes(t) || c.concedente?.toLowerCase().includes(t) || c.codigo_siafi?.toLowerCase().includes(t) || c.objeto?.toLowerCase().includes(t));
    }

    dadosFiltrados = ordenarDados(dadosFiltrados, ordenacaoIndividual.coluna, ordenacaoIndividual.direcao);
    const totalRegistros = dadosFiltrados.length;
    const inicio = (paginaAtual.individual - 1) * itensPorPagina;
    const dadosPagina = dadosFiltrados.slice(inicio, inicio + itensPorPagina);
    const colunasExibidas = ordemColunasIndividual.filter(col => colunasVisiveisIndividual[col]);

    const totalVP = dadosFiltrados.reduce((s, i) => s + (parseFloat(i.valor_proponente) || 0), 0);
    const totalVC = dadosFiltrados.reduce((s, i) => s + (parseFloat(i.valor_concedente) || 0), 0);
    const totalVT = dadosFiltrados.reduce((s, i) => s + (parseFloat(i.valor_total_convenio) || 0), 0);

    const toolbar = document.getElementById('toolbar-individual');
    if (toolbar) toolbar.innerHTML = `
        <div class="toolbar">
            <div class="d-flex gap-2">
                <button class="btn-export" onclick="exportarIndividualCSV()"><i class="material-icons" style="font-size:14px">description</i>CSV</button>
                <button class="btn-export" onclick="exportarIndividualPDF()"><i class="material-icons" style="font-size:14px">picture_as_pdf</i>PDF</button>
                <div class="column-selector-icon" onclick="toggleColumnSelector(event,'individual')">
                    <i class="material-icons" style="font-size:16px">view_column</i> Colunas
                    <div class="column-selector-popup" id="columnSelectorPopupIndividual">
                        <div class="column-selector-grid">
                            ${ordemColunasIndividual.map(col => `<label class="column-selector-item"><input type="checkbox" ${colunasVisiveisIndividual[col]?'checked':''} onchange="toggleColunaIndividual('${col}')">${col.replace(/_/g,' ').toUpperCase()}</label>`).join('')}
                        </div>
                    </div>
                </div>
            </div>
            <div class="toolbar-right">
                <span class="badge bg-secondary">Total: ${totalRegistros} registros</span>
                <select class="items-per-page" onchange="alterarItensPorPagina('individual',this.value)">
                    <option value="25" ${itensPorPagina==25?'selected':''}>25 por página</option>
                    <option value="50" ${itensPorPagina==50?'selected':''}>50 por página</option>
                    <option value="100" ${itensPorPagina==100?'selected':''}>100 por página</option>
                </select>
                <input type="text" class="search-input-small" placeholder="Buscar na tabela..." id="buscaIndividualInput" value="${buscaIndividual}" oninput="buscaIndividualChange(this.value)">
            </div>
        </div>`;

    const tab = document.getElementById('tabela-individual');
    if (!tab) return;
    tab.innerHTML = `
        <div class="table-container">
            <table class="table" style="min-width:1200px">
                <thead><tr>
                    ${colunasExibidas.map(col => `<th class="${ordenacaoIndividual.coluna===col?ordenacaoIndividual.direcao:''}" onclick="ordenar('individual','${col}')">${col.replace(/_/g,' ').toUpperCase()}</th>`).join('')}
                    <th class="text-end">VALOR PROPONENTE</th>
                    <th class="text-end">VALOR CONCEDENTE</th>
                    <th class="text-end">VALOR TOTAL</th>
                    <th>AÇÕES</th>
                </tr></thead>
                <tbody>
                    ${dadosPagina.map(item => {
                        const link = getLinkInteiroTeor(item);
                        return `<tr>
                            ${colunasExibidas.map(col => {
                                let valor = item[col] || '-';
                                if (col.includes('data')) valor = formatarData(valor);
                                if (col === 'codigo_siafi' && valor !== '-') return `<td>${link ? `<a href="${link}" target="_blank" class="siafi-link">${valor}</a>` : valor}</td>`;
                                return `<td>${valor}</td>`;
                            }).join('')}
                            <td class="text-end">${formatarMoeda(item.valor_proponente)}</td>
                            <td class="text-end">${formatarMoeda(item.valor_concedente)}</td>
                            <td class="text-end">${formatarMoeda(item.valor_total_convenio)}</td>
                            <td class="text-center"><button class="btn-action" onclick='abrirModalDetalhesConvenio(${JSON.stringify(item).replace(/'/g,"\\'")})'><i class="material-icons" style="font-size:16px">visibility</i></button></td>

                </tbody>
                <tfoot class="table-footer-total"><tr>
                    <td colspan="${colunasExibidas.length}" class="text-end fw-bold">TOTAIS:</td>
                    <td class="text-end fw-bold">${formatarMoeda(totalVP)}</td>
                    <td class="text-end fw-bold">${formatarMoeda(totalVC)}</td>
                    <td class="text-end fw-bold">${formatarMoeda(totalVT)}</td>
                    <td></td>

function renderizarTabelaExecucao() {
    const conveniosMap = new Map();
    conveniosData.forEach(c => { if (c.codigo_siafi) conveniosMap.set(c.codigo_siafi, c); });

    let dadosFiltrados = execucaoData.filter(e => {
        if (filtrosExecucao.ano && e.ano_exercicio_receita != filtrosExecucao.ano) return false;
        if (filtrosExecucao.numeroSiafi && !e.no_siafi?.toLowerCase().includes(filtrosExecucao.numeroSiafi.toLowerCase())) return false;
        if (filtrosExecucao.anoEmpenho && e.ano_empenho != filtrosExecucao.anoEmpenho) return false;
        if (filtrosExecucao.numeroEmpenho && !e.no_empenho?.toLowerCase().includes(filtrosExecucao.numeroEmpenho.toLowerCase())) return false;
        if (filtrosExecucao.razaoSocialCredor && !e.razao_social_credor?.toLowerCase().includes(filtrosExecucao.razaoSocialCredor.toLowerCase())) return false;
        if (filtrosExecucao.cnpjCpfCredor && !e.cnpj_cpf_credor?.replace(/\D/g,'').includes(filtrosExecucao.cnpjCpfCredor.replace(/\D/g,''))) return false;
        return true;
    });

    if (buscaExecucao) {
        const t = buscaExecucao.toLowerCase();
        dadosFiltrados = dadosFiltrados.filter(e => e.razao_social_credor?.toLowerCase().includes(t) || e.no_siafi?.toLowerCase().includes(t));
    }

    dadosFiltrados = dadosFiltrados.map(e => ({
        ...e,
        proponente: conveniosMap.get(e.no_siafi)?.proponente || '-',
        concedente: conveniosMap.get(e.no_siafi)?.concedente || '-',
        situacao_convenio: conveniosMap.get(e.no_siafi)?.situacao || '-'
    }));

    // Aplicar filtros que dependem do join com convenios
    if (filtrosExecucao.proponente) dadosFiltrados = dadosFiltrados.filter(e => e.proponente?.toLowerCase().includes(filtrosExecucao.proponente.toLowerCase()));
    if (filtrosExecucao.concedente) dadosFiltrados = dadosFiltrados.filter(e => e.concedente?.toLowerCase().includes(filtrosExecucao.concedente.toLowerCase()));
    if (filtrosExecucao.situacaoConvenio) dadosFiltrados = dadosFiltrados.filter(e => e.situacao_convenio === filtrosExecucao.situacaoConvenio);

    dadosFiltrados = ordenarDados(dadosFiltrados, ordenacaoExecucao.coluna, ordenacaoExecucao.direcao);

    const totalRegistros = dadosFiltrados.length;
    const inicio = (paginaAtual.execucao - 1) * itensPorPagina;
    const dadosPagina = dadosFiltrados.slice(inicio, inicio + itensPorPagina);
    const colunasExibidas = ordemColunasExecucao.filter(col => colunasVisiveisExecucao[col]);

    const totalEmpenhado = dadosFiltrados.reduce((s, i) => s + (parseFloat(i.valor_empenhado) || 0), 0);
    const totalLiquidado = dadosFiltrados.reduce((s, i) => s + (parseFloat(i.valor_liquidado) || 0), 0);
    const totalPago = dadosFiltrados.reduce((s, i) => s + (parseFloat(i.valor_pago) || 0), 0);

    const colNomes = {
        no_siafi: 'Nº SIAFI', proponente: 'Proponente', concedente: 'Concedente',
        situacao_convenio: 'Situação', no_empenho: 'Nº Empenho', ano_empenho: 'Ano Empenho',
        razao_social_credor: 'Razão Social Credor', cnpj_cpf_credor: 'CNPJ/CPF Credor',
        valor_empenhado: 'Valor Empenhado', valor_liquidado: 'Valor Liquidado', valor_pago: 'Valor Pago'
    };

    const toolbar = document.getElementById('toolbar-execucao');
    if (toolbar) toolbar.innerHTML = `
        <div class="toolbar">
            <div class="d-flex gap-2">
                <button class="btn-export" onclick="exportarExecucaoCSV()"><i class="material-icons" style="font-size:14px">description</i>CSV</button>
                <button class="btn-export" onclick="exportarExecucaoPDF()"><i class="material-icons" style="font-size:14px">picture_as_pdf</i>PDF</button>
                <div class="column-selector-icon" onclick="toggleColumnSelector(event,'execucao')">
                    <i class="material-icons" style="font-size:16px">view_column</i> Colunas
                    <div class="column-selector-popup" id="columnSelectorPopupExecucao">
                        <div class="column-selector-grid">
                            ${ordemColunasExecucao.map(col => `<label class="column-selector-item"><input type="checkbox" ${colunasVisiveisExecucao[col]?'checked':''} onchange="toggleColunaExecucao('${col}')">${colNomes[col]||col.replace(/_/g,' ').toUpperCase()}</label>`).join('')}
                        </div>
                    </div>
                </div>
            </div>
            <div class="toolbar-right">
                <span class="badge bg-secondary">Total: ${totalRegistros} registros</span>
                <select class="items-per-page" onchange="alterarItensPorPagina('execucao',this.value)">
                    <option value="25" ${itensPorPagina==25?'selected':''}>25 por página</option>
                    <option value="50" ${itensPorPagina==50?'selected':''}>50 por página</option>
                    <option value="100" ${itensPorPagina==100?'selected':''}>100 por página</option>
                </select>
                <input type="text" class="search-input-small" placeholder="Buscar na tabela..." id="buscaExecucaoInput" value="${buscaExecucao}" oninput="buscaExecucaoChange(this.value)">
            </div>
        </div>`;

    const tab = document.getElementById('tabela-execucao');
    if (!tab) return;
    tab.innerHTML = `

            <table class="table" style="min-width:1400px">

                    ${colunasExibidas.map(col => `<th class="${ordenacaoExecucao.coluna===col?ordenacaoExecucao.direcao:''}" onclick="ordenar('execucao','${col}')">${colNomes[col]||col.replace(/_/g,' ').toUpperCase()}</th>`).join('')}

                    ${dadosPagina.map(item => {

                                if (['valor_empenhado','valor_liquidado','valor_pago'].includes(col)) valor = formatarMoeda(valor);

                                if (col === 'no_siafi' && valor !== '-') return `<td>${link ? `<a href="${link}" target="_blank" class="siafi-link">${valor}</a>` : valor}</td>`;
                                return `<td>${valor}</td>`;
                            }).join('')}
                            <td class="text-center"><button class="btn-action" onclick='abrirModalExecucao(${JSON.stringify(item).replace(/'/g,"\\'")})'><i class="material-icons" style="font-size:16px">visibility</i></button></td>

                    <td class="text-end fw-bold">${formatarMoeda(totalLiquidado)}</td>
                    <td class="text-end fw-bold">${formatarMoeda(totalPago)}</td>
                    <td></td>
                </tr></tfoot>
            </table>
        </div>
        ${renderizarPaginacao('execucao', totalRegistros)}`;

function renderizarArrecadacao() {
    const container = document.getElementById('arrecadacao-content');
    if (!container) return;
    const anos = [...new Set(arrecadacaoData.map(a => a.ano_exercicio_receita))].filter(Boolean).sort().reverse();
    const tipos = [...new Set(arrecadacaoData.map(a => a.tipo_de_receita))].filter(Boolean).sort();
    const fontes = [...new Set(arrecadacaoData.map(a => a.fonte))].filter(Boolean).sort();

    // unidade_orcamentaria vem do join com convenios (proponente), classificacao vem do proprio CSV
    const conveniosMap = new Map();
    conveniosData.forEach(c => { if (c.codigo_siafi) conveniosMap.set(c.codigo_siafi, c); });
    const unidades = [...new Set(arrecadacaoData.map(a => conveniosMap.get(a.no_siafi)?.proponente).filter(Boolean))].sort();
    const classificacoes = [...new Set(arrecadacaoData.map(a => a.codigo_classificacao_receita).filter(Boolean))].sort();

    container.innerHTML = `
        <div class="filter-container" id="filtros-arrecadacao">
            <div class="row g-2">
                <div class="col-md-3">
                    <label class="filter-label">Ano</label>

                </div>
                <div class="col-md-3">
                    <label class="filter-label">Nº SIAFI</label>

                </div>
                <div class="col-md-3">
                    <label class="filter-label">Tipo Receita</label>
                    ${criarSelectComBusca('tipoArrecadacao', tipos, filtrosArrecadacao.tipoReceita, 'Selecione o tipo...')}
                </div>
                <div class="col-md-3">
                    <label class="filter-label">Fonte</label>
                    ${criarSelectComBusca('fonteArrecadacao', fontes, filtrosArrecadacao.fonte, 'Selecione a fonte...')}

            </div>
            <div class="row g-2 mt-2">
                <div class="col-md-4">
                    <label class="filter-label">Unidade Orçamentária</label>
                    ${criarAutocomplete('filtroUnidadeArrecadacao', unidades, filtrosArrecadacao.unidadeOrcamentaria, 'Digite ou selecione...')}
                </div>
                <div class="col-md-4">
                    <label class="filter-label">Classificação Orçamentária</label>
                    ${criarAutocomplete('filtroClassifArrecadacao', classificacoes, filtrosArrecadacao.classificacaoOrcamentaria, 'Digite ou selecione...')}
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="d-flex gap-3 flex-wrap">
                        <button class="btn-pesquisa" onclick="aplicarFiltrosArrecadacao()"><i class="fas fa-search"></i>Pesquisar</button>
                        <button class="btn-limpar" onclick="limparFiltrosArrecadacao()"><i class="fas fa-redo"></i>Limpar Filtros</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="toolbar-arrecadacao"></div>
        <div id="tabela-arrecadacao"></div>
    `;

    initSelectComBusca('anoArrecadacao', val => { filtrosArrecadacao.ano = val; });
    initSelectComBusca('tipoArrecadacao', val => { filtrosArrecadacao.tipoReceita = val; });
    initSelectComBusca('fonteArrecadacao', val => { filtrosArrecadacao.fonte = val; });
    initAutocomplete('filtroUnidadeArrecadacao');
    initAutocomplete('filtroClassifArrecadacao');

    renderizarTabelaArrecadacao();
}

function renderizarTabelaArrecadacao() {
    const conveniosMap = new Map();
    conveniosData.forEach(c => { if (c.codigo_siafi) conveniosMap.set(c.codigo_siafi, c); });

    let dadosFiltrados = arrecadacaoData.filter(a => {
        if (filtrosArrecadacao.ano && a.ano_exercicio_receita != filtrosArrecadacao.ano) return false;
        if (filtrosArrecadacao.numeroSiafi && !a.no_siafi?.toLowerCase().includes(filtrosArrecadacao.numeroSiafi.toLowerCase())) return false;
        if (filtrosArrecadacao.tipoReceita && a.tipo_de_receita !== filtrosArrecadacao.tipoReceita) return false;
        if (filtrosArrecadacao.fonte && a.fonte !== filtrosArrecadacao.fonte) return false;
        if (filtrosArrecadacao.classificacaoOrcamentaria && !a.codigo_classificacao_receita?.toLowerCase().includes(filtrosArrecadacao.classificacaoOrcamentaria.toLowerCase())) return false;
        return true;
    }).map(a => ({
        no_siafi: a.no_siafi,
        unidade_orcamentaria: conveniosMap.get(a.no_siafi)?.proponente || '-',
        ano_exercicio_receita: a.ano_exercicio_receita,
        classificacao_orcamentaria: a.codigo_classificacao_receita,
        tipo_de_receita: a.tipo_de_receita,
        fonte: a.fonte,
        data_da_arrecadacao: a.data_da_arrecadacao,
        receita_arrecadada: a.receita_arrecadada,
        _siafi_key: a.no_siafi
    }));

    // Filtro unidade orçamentária (aplicado após join)
    if (filtrosArrecadacao.unidadeOrcamentaria) {
        dadosFiltrados = dadosFiltrados.filter(a => a.unidade_orcamentaria?.toLowerCase().includes(filtrosArrecadacao.unidadeOrcamentaria.toLowerCase()));
    }

    if (buscaArrecadacao) {
        const t = buscaArrecadacao.toLowerCase();
        dadosFiltrados = dadosFiltrados.filter(a => a.no_siafi?.toLowerCase().includes(t) || a.unidade_orcamentaria?.toLowerCase().includes(t));
    }

    dadosFiltrados = ordenarDados(dadosFiltrados, ordenacaoArrecadacao.coluna, ordenacaoArrecadacao.direcao);
    const totalRegistros = dadosFiltrados.length;
    const inicio = (paginaAtual.arrecadacao - 1) * itensPorPagina;
    const dadosPagina = dadosFiltrados.slice(inicio, inicio + itensPorPagina);
    const colunasExibidas = ordemColunasArrecadacao.filter(col => colunasVisiveisArrecadacao[col]);
    const totalArrecadado = dadosFiltrados.reduce((s, i) => s + (parseFloat(i.receita_arrecadada) || 0), 0);

    const colNomesArr = {
        no_siafi: 'Nº SIAFI', unidade_orcamentaria: 'Unidade Orçamentária',
        ano_exercicio_receita: 'Ano Exercício', classificacao_orcamentaria: 'Classificação Orçamentária',
        tipo_de_receita: 'Tipo de Receita', fonte: 'Fonte',
        data_da_arrecadacao: 'Data Arrecadação', receita_arrecadada: 'Valor Arrecadado'
    };

    const toolbar = document.getElementById('toolbar-arrecadacao');
    if (toolbar) toolbar.innerHTML = `
        <div class="toolbar">
            <div class="d-flex gap-2">
                <button class="btn-export" onclick="exportarArrecadacaoCSV()"><i class="material-icons" style="font-size:14px">description</i>CSV</button>
                <button class="btn-export" onclick="exportarArrecadacaoPDF()"><i class="material-icons" style="font-size:14px">picture_as_pdf</i>PDF</button>
                <div class="column-selector-icon" onclick="toggleColumnSelector(event,'arrecadacao')">
                    <i class="material-icons" style="font-size:16px">view_column</i> Colunas
                    <div class="column-selector-popup" id="columnSelectorPopupArrecadacao">
                        <div class="column-selector-grid">
                            ${ordemColunasArrecadacao.map(col => `<label class="column-selector-item"><input type="checkbox" ${colunasVisiveisArrecadacao[col]?'checked':''} onchange="toggleColunaArrecadacao('${col}')">${colNomesArr[col]||col.replace(/_/g,' ').toUpperCase()}</label>`).join('')}
                        </div>
                    </div>
                </div>
            </div>
            <div class="toolbar-right">
                <span class="badge bg-secondary">Total: ${totalRegistros} registros</span>
                <select class="items-per-page" onchange="alterarItensPorPagina('arrecadacao',this.value)">
                    <option value="25" ${itensPorPagina==25?'selected':''}>25 por página</option>
                    <option value="50" ${itensPorPagina==50?'selected':''}>50 por página</option>
                    <option value="100" ${itensPorPagina==100?'selected':''}>100 por página</option>
                </select>
                <input type="text" class="search-input-small" placeholder="Buscar na tabela..." id="buscaArrecadacaoInput" value="${buscaArrecadacao}" oninput="buscaArrecadacaoChange(this.value)">
            </div>
        </div>`;

    const tab = document.getElementById('tabela-arrecadacao');
    if (!tab) return;
    tab.innerHTML = `
        <div class="table-container">
            <table class="table">
                <thead><tr>
                    ${colunasExibidas.map(col => `<th class="${ordenacaoArrecadacao.coluna===col?ordenacaoArrecadacao.direcao:''}" onclick="ordenar('arrecadacao','${col}')">${colNomesArr[col]||col.replace(/_/g,' ').toUpperCase()}</th>`).join('')}
                    <th>AÇÕES</th>
                </tr></thead>
                <tbody>
                    ${dadosPagina.map(item => {
                        const convenio = conveniosMap.get(item._siafi_key || item.no_siafi);
                        const link = convenio ? getLinkInteiroTeor(convenio) : null;
                        return `<tr>
                            ${colunasExibidas.map(col => {
                                let valor = item[col] ?? '-';
                                if (valor === '' || valor === null || valor === undefined) valor = '-';
                                if (col === 'data_da_arrecadacao') valor = formatarData(String(valor));
                                if (col === 'receita_arrecadada') valor = formatarMoeda(valor);
                                if (col === 'no_siafi' && valor !== '-') return `<td>${link ? `<a href="${link}" target="_blank" class="siafi-link">${valor}</a>` : valor}</td>`;
                                return `<td>${valor}</td>`;
                            }).join('')}
                            <td class="text-center"><button class="btn-action" onclick='abrirModalArrecadacao(${JSON.stringify(item).replace(/'/g,"\\'")})'><i class="material-icons" style="font-size:16px">visibility</i></button></td>
                        </tr>`;
                    }).join('')}
                </tbody>
                <tfoot class="table-footer-total"><tr>
                    <td colspan="${colunasExibidas.length - 1}" class="text-end fw-bold">TOTAL ARRECADADO:</td>
                    <td class="text-end fw-bold">${formatarMoeda(totalArrecadado)}</td>
                    <td></td>
                </tr></tfoot>
            </table>
        </div>
        ${renderizarPaginacao('arrecadacao', totalRegistros)}`;
}

function abrirModalDetalhesConvenio(item) {
    const todosLinks = getTodosLinks(item);
    const grupos = {
        '📋 IDENTIFICAÇÃO': ['codigo_siafi','codigo_sigcon','sei','instrumento','ano'],
        '🏢 PARTES': ['proponente','concedente','esfera_concedente'],
        '💰 FINANCEIRO': ['valor_proponente','valor_concedente','valor_total_convenio','tipo_contrapartida'],
        '📅 DATAS': ['data_assinatura','data_publicacao','inicio_vigencia','termino_vigencia'],
        '📄 INFORMAÇÕES': ['objeto','situacao']
    };
    let html = '';
    if (todosLinks.length > 0) {
        html += `<div class="alert alert-info mb-3"><i class="material-icons">link</i> <strong>Documentos Disponíveis:</strong><div class="mt-2 d-flex flex-wrap gap-2">`;
        todosLinks.forEach(l => {
            html += `<a href="${l.url}" target="_blank" class="btn-link-document"><i class="material-icons">open_in_new</i> ${l.label}</a>`;
        });
        html += `</div></div>`;
    }
    for (const [titulo, campos] of Object.entries(grupos)) {
        let conteudo = '';
        for (const campo of campos) {
            const valor = item[campo];
            if (valor && valor !== '' && valor !== '-') {
                let vd = campo.includes('valor') ? formatarMoeda(valor) : campo.includes('data') || campo.includes('vigencia') || campo.includes('publicacao') || campo.includes('assinatura') ? formatarData(valor) : valor;
                conteudo += `<div class="info-row"><div class="info-label">${campo.replace(/_/g,' ').toUpperCase()}:</div><div class="info-value">${vd}</div></div>`;
            }
        }
        if (conteudo) html += `<div class="info-section"><h6>${titulo}</h6>${conteudo}</div>`;
    }
    document.getElementById('modalContent').innerHTML = html;
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

document.addEventListener('click', e => {
    if (!e.target.closest('.column-selector-icon'))
        document.querySelectorAll('.column-selector-popup').forEach(p => p.classList.remove('show'));
    if (!e.target.closest('.select-with-search'))
        document.querySelectorAll('.select-options').forEach(o => o.classList.remove('show'));
    if (!e.target.closest('.autocomplete-wrapper'))
        document.querySelectorAll('.autocomplete-list').forEach(o => o.classList.remove('show'));
});

document.addEventListener('DOMContentLoaded', carregarDados);

// Iframe height: usa ResizeObserver para disparar somente quando necessário
(function() {
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight, document.body.offsetHeight);
        try { window.parent.postMessage({ iframeHeight: h + 30, iframeResize: true }, '*'); } catch(e) {}
    }
    if (window.ResizeObserver) {
        new ResizeObserver(sendHeight).observe(document.body);
    } else {
        window.addEventListener('resize', sendHeight);
        setInterval(sendHeight, 2000);
    }
    sendHeight();
})();
</script>
